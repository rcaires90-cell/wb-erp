function salvarEdicaoIndeferimento(id) {
  const c = indeferimentos.find(x=>x.id===id);
  if (!c) return;
  c.cliente     = document.getElementById('ei_cliente').value.trim() || c.cliente;
  c.servico     = document.getElementById('ei_servico').value;
  c.status      = document.getElementById('ei_status').value;
  c.motivo      = document.getElementById('ei_motivo').value.trim();
  c.estrategia  = document.getElementById('ei_estrategia').value.trim();
  saveData();
  closeModal();
  navigateTo('indeferimentos');
}

function excluirIndeferimento(id) {
  if (!confirm('Deseja excluir este registro?')) return;
  indeferimentos = indeferimentos.filter(x=>x.id!==id);
  saveData();
  navigateTo('indeferimentos');
}

function renderFaq() {

    {

        { q:'Como contar as ausências do Brasil para o prazo de residência?', a:'Ausências temporárias e justificadas não interrompem a contagem, mas devem ser declaradas e justificadas. O MJSP avalia caso a caso. Base: Art. 233, Dec. nº 9.199/2017.' },
        { q:'O Certificado CELPE-BRAS é sempre obrigatório?', a:'É obrigatório para naturalizações ordinárias de não-lusófonos. Nacionais de países de língua portuguesa (Portugal, Angola, Moçambique, etc.) estão dispensados. Base: Art. 5º, Portaria MJ nº 623/2020.' },
        { q:'Qual o prazo legal para análise do pedido de naturalização?', a:'A Portaria nº 623/2020 e o Dec. nº 9.199/2017 preveem análise em até 180 dias corridos da data de protocolo, podendo ser prorrogado por igual período uma vez.' },
        { q:'O que é a "Apostila de Haia" e quando é necessária?', a:'É o processo de autenticação internacional de documentos públicos estrangeiros, substitui a legalização consular para países signatários. Obrigatória para certidões e atestados de antecedentes emitidos no exterior. Base: Dec. nº 8.660/2016.' },
      ]
    },
    {
      cat:'🪪 Autorização de Residência (RNM)', items:[
        { q:'Qual a diferença entre RNM e o antigo RNE?', a:'O RNE foi extinto pela Lei nº 13.445/2017 (Lei de Migração). O RNM (Registro Nacional Migratório) é o documento atual, emitido pela Polícia Federal, com chip e biometria. Base: Arts. 30-33 e 67-69, Lei nº 13.445/2017.' },
        { q:'O visto de turismo pode ser convertido em autorização de residência?', a:'Não diretamente. O visto de turista não gera direito à residência. É necessário obter um amparo legal próprio (contrato de trabalho, família, etc.) e protocolar o pedido antes do vencimento do visto. Base: Art. 30, Lei nº 13.445/2017.' },
        { q:'O que acontece se o estrangeiro ficar sem regularização?', a:'Sujeita-se a multa diária por permanência irregular e, em casos mais graves, à deportação. Base: Arts. 109-111, Lei nº 13.445/2017 e arts. 384-398, Dec. nº 9.199/2017.' },
        { q:'Nacionais do Mercosul têm tratamento diferenciado?', a:'Sim. O Acordo de Residência do Mercosul (Dec. nº 6.975/2009) permite residência temporária simplificada por 2 anos, com apenas comprovação de nacionalidade e antecedentes criminais.' },
      ]
    },
    {
      cat:'✈️ Visto de Turismo (EUA)', items:[
        { q:'O que é o INA § 214(b) e como evitar negativa?', a:'É a presunção legal de que todo solicitante pretende imigrar. Para refutar, o solicitante deve apresentar vínculos sólidos: emprego formal, imóvel, família, renda estável. Quanto mais fortes os vínculos, menor o risco. Base: INA § 214(b) | 9 FAM 302.1-2.' },
        { q:'O visto B-2 nega automaticamente se tive negativa anterior?', a:'Não automaticamente, mas negativas anteriores constam no sistema americano (PIMS) e são avaliadas pelo oficial consular. Novas solicitações devem apresentar mudança substancial no perfil do solicitante.' },
        { q:'DS-160: posso editar após submissão?', a:'Após submissão definitiva, o DS-160 não pode ser editado. Se houver erro relevante, deve-se criar um novo formulário. A confirmação impressa deve ser levada à entrevista. Base: State Dept – CEAC.' },
        { q:'Qual o prazo de validade do visto B-1/B-2 após emissão?', a:'Geralmente 10 anos para brasileiros (multiple entry), mas pode ser 1 ou 5 anos dependendo do perfil. A estada máxima por visita é determinada pelo agente da CBP na entrada, geralmente 6 meses. Base: 9 FAM 402.2-7.' },
      ]
    },
  ];

  return `

      ${topicos.map(t=>`

              </div>`).join('')}
          </div>
        </div>`).join('')}

let parcelasData = [];

function renderFinanceiroAvancado() {
  const todasParcelas = parcelasData.flatMap(c => c.parcelas.map(p => ({...p, cliente: c.cliente, servico: c.servico, totalContrato: c.valorTotal})));
  const totalRecebido = todasParcelas.filter(p=>p.status==='pago').reduce((a,p)=>a+p.valor,0);
  const totalPendente = todasParcelas.filter(p=>p.status==='pendente').reduce((a,p)=>a+p.valor,0);
  const totalAtrasado = todasParcelas.filter(p=>p.status==='atrasado').reduce((a,p)=>a+p.valor,0);
  const totalGeral    = todasParcelas.reduce((a,p)=>a+p.valor,0) || 1;
  const inadimplentes = [...new Set(todasParcelas.filter(p=>p.status==='atrasado').map(p=>p.cliente))];
  const stColor = { pago:'badge-green', pendente:'badge-gold', atrasado:'badge-red' };
  const stLabel = { pago:'✓ Pago', pendente:'⏳ Pendente', atrasado:'🚨 Atrasado' };

  return `
    <div class="stat-grid" style="margin-bottom:28px">
      <div class="stat-card green"><div class="stat-icon">💚</div><div class="stat-label">Total Recebido</div><div class="stat-value">R$${(totalRecebido/1000).toFixed(1)}k</div><div class="stat-sub">${todasParcelas.filter(p=>p.status==='pago').length} parcela(s) quitada(s)</div></div>
      <div class="stat-card gold"><div class="stat-icon">⏳</div><div class="stat-label">A Receber</div><div class="stat-value">R$${(totalPendente/1000).toFixed(1)}k</div><div class="stat-sub">${todasParcelas.filter(p=>p.status==='pendente').length} parcela(s) a vencer</div></div>
      <div class="stat-card red"><div class="stat-icon">🚨</div><div class="stat-label">Em Atraso</div><div class="stat-value">R$${(totalAtrasado/1000).toFixed(1)}k</div><div class="stat-sub">${inadimplentes.length} cliente(s) inadimplente(s)</div></div>
      <div class="stat-card blue"><div class="stat-icon">📊</div><div class="stat-label">Volume Contratado</div><div class="stat-value">R$${((totalRecebido+totalPendente+totalAtrasado)/1000).toFixed(1)}k</div><div class="stat-sub">${parcelasData.length} contratos</div></div>
    </div>

    ${inadimplentes.length > 0 ? `
    <div style="background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.25);border-radius:16px;padding:20px 24px;margin-bottom:24px">

function tabelaParcelasHTML(lista) {
  const stColor = { pago:'badge-green', pendente:'badge-gold', atrasado:'badge-red' };
  const stLabel = { pago:'✓ Pago', pendente:'⏳ Pendente', atrasado:'🚨 Atrasado' };
  if (!lista.length) return `<div style="text-align:center;padding:30px;color:var(--text3)">Nenhuma parcela encontrada.</div>`;
  return `<table class="tbl">
    <thead><tr><th>Cliente</th><th>Serviço</th><th>Parcela</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Pgto</th><th>Ações</th></tr></thead>
    <tbody>
      ${lista.map((p,i)=>`
        <tr>
          <td style="font-weight:500;color:var(--text)">${p.cliente.split(' ').slice(0,2).join(' ')}</td>
          <td style="font-size:0.75rem">${servicoBadge(p.servico)}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text3)">Parc. ${p.num}</td>
          <td style="font-family:'DM Mono',monospace;color:var(--gold);font-size:0.82rem">R$ ${p.valor.toLocaleString('pt-BR')}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.78rem;color:${p.status==='atrasado'?'#f87171':'var(--text2)'}">${p.venc}</td>
          <td><span class="badge ${stColor[p.status]}">${stLabel[p.status]}</span></td>
          <td style="font-size:0.75rem;color:var(--text3)">${p.dtPgto||'—'}</td>
          <td style="display:flex;gap:5px">
            ${p.status!=='pago'?`<button class="btn btn-sm btn-gold" onclick="marcarPago('${p.cliente}',${p.num})">✓</button>`:''}
            ${p.status==='atrasado'?`<button class="btn btn-sm btn-danger" onclick="openCobrancaModal('${p.cliente}',${p.valor})">📧</button>`:''}
          </td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function filtrarParcelasStatus(st) {
  const todasParcelas = parcelasData.flatMap(c => c.parcelas.map(p => ({...p, cliente: c.cliente, servico: c.servico})));
  const lista = st ? todasParcelas.filter(p=>p.status===st) : todasParcelas;
  const el = document.getElementById('tabela-parcelas-body');
  if (el) el.innerHTML = tabelaParcelasHTML(lista);
}

function marcarPago(clienteNome, numParcela) {
  const contrato = parcelasData.find(c=>c.cliente===clienteNome);
  if (contrato) {
    const parc = contrato.parcelas.find(p=>p.num===numParcela);
    if (parc) {
      parc.status = 'pago';
      parc.dtPgto = new Date().toLocaleDateString('pt-BR');
      saveData();
      navigateTo('financeiro-avancado');
      showToast('✅ Parcela marcada como paga!');
    }
  }
}

function salvarNovoContratoParcelas() {
  const cliente = document.getElementById('ncp_cliente').value.trim();
  const valorRaw = document.getElementById('ncp_valor').value.replace(/\./g,'').replace(',','.');
  const valor    = parseFloat(valorRaw) || 0;
  const erro     = document.getElementById('ncp_erro');
  if (!cliente) { erro.textContent='⚠️ Cliente é obrigatório.'; erro.style.display='block'; return; }
  if (!valor)   { erro.textContent='⚠️ Valor é obrigatório.';  erro.style.display='block'; return; }

  const nParcelas = parseInt(document.getElementById('ncp_nparcelas').value);
  const servico   = document.getElementById('ncp_servico').value;
  const venc1Raw  = document.getElementById('ncp_venc1').value;
  const venc1     = venc1Raw ? new Date(venc1Raw) : new Date();
  const valParcela = Math.round(valor / nParcelas * 100) / 100;

  const parcelas = [];
  for (let i = 0; i < nParcelas; i++) {
    const vDate = new Date(venc1);
    vDate.setMonth(vDate.getMonth() + i);
    parcelas.push({
      num: i+1,
      valor: i < nParcelas-1 ? valParcela : Math.round((valor - valParcela*(nParcelas-1))*100)/100,
      venc: vDate.toLocaleDateString('pt-BR'),
      status: 'pendente',
      dtPgto: null,
    });
  }

  parcelasData.push({ id: _parcelasId++, cliente, servico, valorTotal: valor, parcelas });
  saveData();
  closeModal();
  navigateTo('financeiro-avancado');
  showToast(`✅ Contrato de ${nParcelas}x para "${cliente.split(' ')[0]}" criado!`);
}

function handleDrop(event, clienteId) {
  event.preventDefault();
  event.target.closest('[ondrop]').style.borderColor = 'var(--border2)';
  uploadArquivos(clienteId, event.dataTransfer.files);
}

function uploadArquivos(clienteId, fileList) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  if (!c.arquivos) c.arquivos = [];

  let pendentes = fileList.length;
  let erros = 0;

  Array.from(fileList).forEach(file => {
    if (file.size > 2.1 * 1024 * 1024) {
      showToast(`❌ "${file.name}" excede 2MB.`, 'error');
      pendentes--; return;
    }

    // Detectar categoria pelo nome
    const nLower = file.name.toLowerCase();
    let cat = 'Outro';
    if (nLower.includes('contrato'))         cat = 'Contrato';
    else if (nLower.includes('adaptacao') || nLower.includes('adaptação') || nLower.includes('nome')) cat = 'Termo de Adaptação de Nome';
    else if (nLower.includes('checklist') || nLower.includes('check')) cat = 'Check-List';
    else if (nLower.includes('imagem') || nLower.includes('voz')) cat = 'Termo de Imagem e Voz';
    else if (nLower.includes('recibo'))      cat = 'Recibo';
    else if (nLower.includes('passaporte'))  cat = 'Passaporte';
    else if (nLower.includes('cpf'))         cat = 'CPF';
    else if (nLower.includes('certid'))      cat = 'Certidão';
    else if (nLower.includes('procuracao') || nLower.includes('procuração')) cat = 'Procuração';

    const reader = new FileReader();
    reader.onload = e => {
      c.arquivos.push({
        id      : Date.now() + Math.random(),
        nome    : file.name,
        cat,
        tipo    : file.type,
        tamanho : file.size,
        data    : new Date().toLocaleDateString('pt-BR'),
        base64  : e.target.result,
      });
      pendentes--;
      if (pendentes === 0) {
        saveData();
        // Re-render lista do cliente específico
        const el = document.getElementById(`arquivos-${clienteId}`);
        if (el) el.innerHTML = renderArquivos(clienteId);
        // Atualiza contagem no header
        const panel = document.querySelector(`.dossie-card[data-nome="${c.nome.toLowerCase()}"] .panel-header div div:nth-child(2)`);
        if (panel) panel.textContent = `${c.servico} · ${c.arquivos.length} arquivo${c.arquivos.length!==1?'s':''}`;
        showToast(`✅ ${fileList.length - erros} arquivo(s) enviado(s) com sucesso!`);
      }
    };
    reader.onerror = () => { erros++; pendentes--; };
    reader.readAsDataURL(file);
  });
}

function baixarArquivo(clienteId, arquivoId) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c || !c.arquivos) return;
  const arq = c.arquivos.find(a=>a.id===arquivoId);
  if (!arq) return;
  const link = document.createElement('a');
  link.href = arq.base64;
  link.download = arq.nome;
  link.click();
}

function excluirArquivo(clienteId, arquivoId) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c || !c.arquivos) return;
  const arq = c.arquivos.find(a=>a.id===arquivoId);
  if (!confirm(`Excluir "${arq?.nome}"?`)) return;
  c.arquivos = c.arquivos.filter(a=>a.id!==arquivoId);
  saveData();
  const el = document.getElementById(`arquivos-${clienteId}`);
  if (el) el.innerHTML = renderArquivos(clienteId);
  showToast('🗑️ Arquivo excluído.', 'info');
}

function valorExtenso(n) {
  const un = ['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const dz = ['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const ct = ['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  if (n===0) return 'zero reais';
  let v = Math.round(n);
  let txt = '';
  if (v>=1000) { txt += (un[Math.floor(v/1000)]||dz[Math.floor(v/1000/10)])+' mil'; v = v%1000; if(v) txt+=' e '; }
  if (v>=100) { txt += v===100?'cem':ct[Math.floor(v/100)]; v=v%100; if(v) txt+=' e '; }
  if (v>=20) { txt += dz[Math.floor(v/10)]; v=v%10; if(v) txt+=' e '; }
  if (v>0) txt += un[v];
  return txt.trim() + ' reais';
}

function gerarContrato() {
  const cId  = parseInt(document.getElementById('gc_cliente')?.value);
  const mId  = document.getElementById('gc_modelo')?.value;
  if (!cId || !mId) { showToast('⚠️ Selecione cliente e modelo.','warn'); return; }

  const c = clientes.find(x=>x.id===cId);
  if (!c) return;

  let template = '';
  if (mId.startsWith('custom_')) {
    const customId = parseInt(mId.replace('custom_',''));
    const m = modelosPersonalizados.find(x=>x.id===customId);
    template = m?.corpo || '';
  } else {
    template = GERADOR_TEMPLATES[mId] || '';
  }

  if (!template) { showToast('⚠️ Modelo não encontrado.','error'); return; }

  const hoje = new Date();
  const dataFormatada = hoje.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const local = (configEmpresa?.endereco?.split(',').pop()?.trim()) || 'São Paulo, SP';

  const contrato = template
    .replace(/\{\{NOME\}\}/g, c.nome)
    .replace(/\{\{CPF\}\}/g, c.cpf || '___________________')
    .replace(/\{\{TEL\}\}/g, c.tel || '___________________')
    .replace(/\{\{EMAIL\}\}/g, c.email || '___________________')
    .replace(/\{\{PAIS\}\}/g, c.pais || '___________________')
    .replace(/\{\{SERVICO\}\}/g, c.servico)
    .replace(/\{\{VALOR\}\}/g, c.valor.toLocaleString('pt-BR',{minimumFractionDigits:2}))
    .replace(/\{\{VALOR_EXTENSO\}\}/g, valorExtenso(c.valor))
    .replace(/\{\{DATA\}\}/g, dataFormatada)
    .replace(/\{\{LOCAL\}\}/g, local)
    .replace(/\{\{RESPONSAVEL\}\}/g, c.responsavel || 'Renato Caires');

  const out  = document.getElementById('gc_output');
  const txt  = document.getElementById('gc_texto');
  const btn  = document.getElementById('gc_copy_btn');
  const salvarBtn = document.getElementById('gc_salvar_btn');
  if (!out || !txt) return;

  txt.textContent = contrato;
  out.style.display = 'block';

  btn.onclick = () => {
    const texto = txt.innerText || txt.textContent;
    navigator.clipboard.writeText(texto).then(()=>showToast('✅ Contrato copiado! Cole no Word.'));
  };

  salvarBtn.onclick = () => {
    const texto = txt.innerText || txt.textContent;
    const nomeDoc = `Contrato – ${c.nome.split(' ').slice(0,2).join(' ')} – ${new Date().toLocaleDateString('pt-BR')}`;
    // Salva como documento editado na lista de documentos salvos
    if (!documentosSalvos) window.documentosSalvos = [];
    window.documentosSalvos.push({ id: Date.now(), nome: nomeDoc, texto, clienteId: c.id, data: new Date().toLocaleDateString('pt-BR') });
    showToast(`💾 Contrato salvo como "${nomeDoc}"!`);
  };

  out.scrollIntoView({ behavior:'smooth' });
}

function renderFiscal() {
  const hoje      = new Date();
  const mesAtual  = hoje.getMonth();
  const anoAtual  = hoje.getFullYear();
  const nfMes     = notasFiscais.filter(n => {
    const [d,m,a] = (n.emissao||'').split('/');
    return parseInt(m)-1===mesAtual && parseInt(a)===anoAtual;
  });
  const totalNfMes    = nfMes.reduce((a,b)=>a+(b.valor||0),0);
  const totalISSMes   = nfMes.reduce((a,b)=>a+(b.iss||0),0);
  const nfPendentes   = notasFiscais.filter(n=>n.status==='Pendente');

function switchFiscalTab(idx) {
  [0,1,2].forEach(i => {
    const tab = document.getElementById(`fiscal-tab-${i}`);
    const btn = document.getElementById(`ftab-${i}`);
    if (tab) tab.style.display = i===idx ? '' : 'none';
    if (btn) {
      btn.style.background = i===idx ? 'var(--navy3)' : 'transparent';
      btn.style.color      = i===idx ? 'var(--gold)' : 'var(--text3)';
    }
  });
}

function tabelaNFs(lista) {
  const stColor = { 'Emitida':'badge-green', 'Pendente':'badge-orange', 'Cancelada':'badge-red', 'Substituída':'badge-gray' };
  if (!lista.length) return `<div style="text-align:center;padding:40px;color:var(--text3)">Nenhuma nota fiscal registrada. Clique em <strong style="color:var(--gold)">+ Emitir Nota Fiscal</strong> para começar.</div>`;
  return `<table class="tbl">
    <thead><tr><th>Nº NF</th><th>Tomador</th><th>Descrição do Serviço</th><th>Emissão</th><th>Valor</th><th>ISS</th><th>Status</th><th>Ações</th></tr></thead>
    <tbody>
      ${[...lista].reverse().map(n=>`
        <tr>
          <td style="font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--gold);font-weight:600">${String(n.numero).padStart(6,'0')}</td>
          <td>
            <div style="font-size:0.82rem;font-weight:500;color:var(--text)">${n.clienteNome?.split(' ').slice(0,3).join(' ')||'—'}</div>
            <div style="font-size:0.7rem;color:var(--text3)">${n.clienteCpf||''}</div>
          </td>
          <td style="font-size:0.78rem;max-width:220px;color:var(--text2)">${n.servico||'—'}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.78rem">${n.emissao||'—'}</td>
          <td style="font-family:'DM Mono',monospace;color:var(--green);font-weight:600">R$ ${(n.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text3)">R$ ${(n.iss||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
          <td><span class="badge ${stColor[n.status]||'badge-gray'}">${n.status}</span></td>
          <td style="display:flex;gap:5px">
            <button class="btn btn-sm btn-gold" onclick="visualizarNF(${n.id})" title="Visualizar/Imprimir">👁</button>
            ${n.status==='Pendente'?`<button class="btn btn-sm btn-outline" onclick="emitirNF(${n.id})" title="Emitir">✅</button>`:''}
            ${n.status!=='Cancelada'&&n.status!=='Emitida'?`<button class="btn btn-sm btn-danger" onclick="cancelarNF(${n.id})">✕</button>`:''}
          </td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function filtrarNFs() {
  const st = document.getElementById('nf-filtro-status')?.value||'';
  const lista = st ? notasFiscais.filter(n=>n.status===st) : notasFiscais;
  const el = document.getElementById('tabela-nfs');
  if (el) el.innerHTML = tabelaNFs(lista);
}

// ── MODAL: Nova Nota Fiscal ───────────────────────────────────────

      </div>
      <div class="form-field">
        <label>Alíquota ISS (%)</label>
        <input id="nf_aliquota" type="number" value="${configEmpresa.iss||2}" min="0" max="5" step="0.5" oninput="calcularISSNF()">
      </div>
      <div class="form-field">
        <label>ISS Calculado</label>
        <input id="nf_iss_valor" readonly placeholder="Auto" style="background:var(--navy);color:var(--green);font-weight:600">

  if (clientePreId) setTimeout(preencherDadosTomador, 100);

function preencherDadosTomador() {
  const sel  = document.getElementById('nf_cliente')?.value;
  const ext  = document.getElementById('nf_externo_area');
  const cpfI = document.getElementById('nf_tomador_cpf');
  if (sel === 'externo') {
    if (ext) ext.style.display = '';
    if (cpfI) cpfI.value = '';
    return;
  }
  if (ext) ext.style.display = 'none';
  const c = clientes.find(x=>x.id===parseInt(sel));
  if (c && cpfI) cpfI.value = c.cpf||'';
  // Auto-preenche valor se disponível
  const valI = document.getElementById('nf_valor');
  if (c && valI && !valI.value) { valI.value = c.valor||''; calcularISSNF(); }
  // Auto-preenche serviço
  const svcT = document.getElementById('nf_servico');
  if (c && svcT && !svcT.value) svcT.value = `Assessoria e consultoria em processos migratórios — ${c.servico}`;
}

function selecionarServicoNF(v) {
  const t = document.getElementById('nf_servico');
  if (!t) return;
  if (v && v !== '__custom__') t.value = v;
}

function calcularISSNF() {
  const val  = parseFloat(document.getElementById('nf_valor')?.value||0);
  const ali  = parseFloat(document.getElementById('nf_aliquota')?.value||2);
  const out  = document.getElementById('nf_iss_valor');
  if (out) out.value = 'R$ ' + (val * ali / 100).toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function salvarNF(status) {
  const cId  = document.getElementById('nf_cliente')?.value;
  const erro = document.getElementById('nf_erro');
  const servico = document.getElementById('nf_servico')?.value?.trim();
  const valorS  = parseFloat(document.getElementById('nf_valor')?.value||0);
  const aliquota= parseFloat(document.getElementById('nf_aliquota')?.value||2);

  let tomadorNome = '', tomadorCpf = '';
  if (cId === 'externo') {
    tomadorNome = document.getElementById('nf_ext_nome')?.value?.trim();
    if (!tomadorNome) { if(erro){erro.textContent='⚠️ Nome do tomador é obrigatório.';erro.style.display='block';} return; }
  } else if (cId) {
    const c = clientes.find(x=>x.id===parseInt(cId));
    tomadorNome = c?.nome||''; tomadorCpf = c?.cpf||'';
  } else {
    if(erro){erro.textContent='⚠️ Selecione o tomador de serviço.';erro.style.display='block';} return;
  }
  if (!servico) { if(erro){erro.textContent='⚠️ Descrição do serviço é obrigatória.';erro.style.display='block';} return; }
  if (!valorS || valorS<=0) { if(erro){erro.textContent='⚠️ Valor inválido.';erro.style.display='block';} return; }

  const iss   = Math.round(valorS * aliquota) / 100;
  const hoje  = new Date().toLocaleDateString('pt-BR');
  const [cm,ca] = (document.getElementById('nf_competencia')?.value||hoje).split('/');

  notasFiscais.push({
    id           : _nfId,
    numero       : _nfId,
    clienteId    : parseInt(cId)||null,
    clienteNome  : tomadorNome,
    clienteCpf   : document.getElementById('nf_tomador_cpf')?.value || tomadorCpf,
    servico,
    valor        : valorS,
    aliquota,
    iss          : parseFloat(iss.toFixed(2)),
    status,
    emissao      : document.getElementById('nf_emissao')?.value || hoje,
    competencia  : `${cm?.padStart(2,'0')||'01'}/${ca||new Date().getFullYear()}`,
    obs          : document.getElementById('nf_obs')?.value?.trim()||'',
  });
  _nfId++;
  saveData();
  closeModal();
  navigateTo('fiscal');
  showToast(status==='Emitida' ? '✅ Nota Fiscal emitida com sucesso!' : '💾 Nota salva como rascunho.');
}

function emitirNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  if (!confirm(`Emitir a NF-e nº ${String(n.numero).padStart(6,'0')} para ${n.clienteNome}?`)) return;
  n.status = 'Emitida';
  saveData();
  navigateTo('fiscal');
  showToast('✅ Nota Fiscal emitida!');
}

function cancelarNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  if (!confirm(`Cancelar a NF-e nº ${String(n.numero).padStart(6,'0')}?`)) return;
  n.status = 'Cancelada';
  saveData();
  navigateTo('fiscal');
  showToast('❌ Nota Fiscal cancelada.','info');
}

// ── VISUALIZAR / IMPRIMIR NF ──────────────────────────────────────
function visualizarNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  const html = gerarHTMLNF(n);
  openModal(`
    <div class="modal-title">🧾 NF-e Nº ${String(n.numero).padStart(6,'0')}</div>
    <div style="background:#fff;border-radius:10px;padding:4px;max-height:65vh;overflow-y:auto">
      <iframe id="nf-preview" style="width:100%;height:480px;border:none;border-radius:8px"></iframe>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="imprimirNF(${n.id})">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
    </div>
  `);
  setTimeout(()=>{
    const iframe = document.getElementById('nf-preview');
    if (!iframe) return;
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
  },100);
}

function imprimirNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  const win = window.open('','_blank');
  win.document.write(gerarHTMLNF(n));
  win.document.close();
  setTimeout(()=>win.print(),500);
}

  return `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
  <title>NFS-e Nº ${num} — WB Assessoria Migratória</title>

    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

    .field span  { font-size:12px; font-weight:600; color:#111; }

function openGerarGuiaISS() {
  const hoje = new Date();
  const mesAtual = hoje.getMonth()+1;
  const anoAtual = hoje.getFullYear();
  // Calcula total de serviços do mês atual
  const nfMes = notasFiscais.filter(n=>{
    if (n.status==='Cancelada') return false;
    const [,m,a] = (n.competencia||'').split('/');
    return parseInt(m)===mesAtual && parseInt(a)===anoAtual;
  });
  const totalServicos = nfMes.reduce((a,b)=>a+(b.valor||0),0);
  const totalISS      = nfMes.reduce((a,b)=>a+(b.iss||0),0);
  // Vencimento: dia 10 do mês seguinte
  const vencDt = new Date(anoAtual, mesAtual, 10);
  const venc   = vencDt.toLocaleDateString('pt-BR');

  openModal(`
    <div class="modal-title">🏦 Gerar Guia de ISS</div>
    <div style="background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:0.82rem">
      <div style="color:var(--text3);margin-bottom:8px">Cálculo automático baseado nas NFS-e do mês selecionado:</div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div><div style="font-size:0.7rem;color:var(--text3)">NF-e emitidas</div><div style="font-weight:700;color:var(--text)">${nfMes.length}</div></div>
        <div><div style="font-size:0.7rem;color:var(--text3)">Total serviços</div><div style="font-weight:700;color:var(--gold)">R$ ${totalServicos.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
        <div><div style="font-size:0.7rem;color:var(--text3)">ISS ${configEmpresa.iss||2}%</div><div style="font-weight:700;color:var(--green)">R$ ${totalISS.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>

    </div>

        <label>Mês de Competência</label>
        <select id="guia_mes">
          ${MESES_PT.map((m,i)=>`<option value="${i+1}" ${i+1===mesAtual?'selected':''}>${m}</option>`).join('')}

      </div>
      <div class="form-field">
        <label>Ano</label>
        <input id="guia_ano" type="number" value="${anoAtual}">

        <label>Vencimento</label>

function calcGuia() {
  const s = parseFloat(document.getElementById('guia_servicos')?.value||0);
  const a = parseFloat(document.getElementById('guia_aliquota')?.value||2);
  const o = document.getElementById('guia_iss');
  if (o) o.value = (s*a/100).toFixed(2);
}

function salvarGuiaISS() {
  const mes  = parseInt(document.getElementById('guia_mes')?.value);
  const ano  = parseInt(document.getElementById('guia_ano')?.value);
  const svc  = parseFloat(document.getElementById('guia_servicos')?.value||0);
  const ali  = parseFloat(document.getElementById('guia_aliquota')?.value||2);
  const iss  = parseFloat(document.getElementById('guia_iss')?.value||0);
  const venc = document.getElementById('guia_venc')?.value;

  guiasISS.push({ id:_guiaId++, mes, ano, valorServicos:svc, aliquota:ali, valor:iss, vencimento:venc, status:'Pendente', emitido:new Date().toLocaleDateString('pt-BR') });
  saveData();
  closeModal();
  navigateTo('fiscal');
  showToast('🏦 Guia de ISS gerada! Acesse a aba Guias ISS.');
}

function marcarGuiaPaga(id) {
  const g = guiasISS.find(x=>x.id===id);
  if (!g) return;
  g.status = 'Pago';
  g.dataPagamento = new Date().toLocaleDateString('pt-BR');
  saveData();
  navigateTo('fiscal');
  showToast('✅ Guia marcada como paga!');
}

function excluirGuia(id) {
  if (!confirm('Excluir esta guia?')) return;
  guiasISS = guiasISS.filter(x=>x.id!==id);
  saveData();
  navigateTo('fiscal');
}

function calcularScore(c) {
  let score = 100;
  // Docs pendentes
  score -= (c.docsPendentes?.length || 0) * 8;
  // Status
  if (c.status === 'Pendente Documentação') score -= 20;
  if (c.status === 'Cancelado')             score -= 50;
  if (c.status === 'Concluído')             score = 100;
  // Pagamento
  if (!c.pago) score -= 15;
  // Progresso baixo
  const pct = c.etapa / (c.totalEtapas || 1);
  if (pct < 0.25) score -= 10;
  // Arquivos carregados
  const nArq = (c.arquivos||[]).length;
  if (nArq === 0) score -= 10;
  return Math.max(0, Math.min(100, score));
}

function renderRadar() {
  const sorted = [...clientes].sort((a,b) => calcularScore(a) - calcularScore(b));
  const criticos  = sorted.filter(c => calcularScore(c) < 40 && c.status !== 'Concluído');
  const atencao   = sorted.filter(c => { const s = calcularScore(c); return s >= 40 && s < 70 && c.status !== 'Concluído'; });
  const saudaveis = sorted.filter(c => calcularScore(c) >= 70 || c.status === 'Concluído');

  function card(c) {
    const score = calcularScore(c);
    const cor   = score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--orange)' : 'var(--red)';
    const pct   = Math.round(c.etapa / (c.totalEtapas||1) * 100);
    const alertas = [];
    if (!c.pago)                           alertas.push('💸 Pagamento pendente');
    if ((c.docsPendentes?.length||0) > 0)  alertas.push(`📄 ${c.docsPendentes.length} doc(s) pendente(s)`);
    if (c.status === 'Pendente Documentação') alertas.push('⚠️ Aguardando documentação');
    if (!(c.arquivos?.length))             alertas.push('📁 Sem arquivos no dossiê');

    return `

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div>
            <div style="font-weight:600;font-size:0.88rem;color:var(--text)">${c.nome.split(' ').slice(0,3).join(' ')}</div>
            <div style="font-size:0.72rem;color:var(--text3);margin-top:2px">${c.servico}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:1.4rem;font-weight:800;color:${cor}">${score}</div>

        </div>
        <div style="background:var(--navy3);border-radius:4px;height:6px;margin-bottom:10px">
          <div style="height:6px;border-radius:4px;background:${cor};width:${pct}%;transition:width 0.4s"></div>
        </div>
        ${alertas.length ? `<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">${alertas.map(a=>`<div style="font-size:0.72rem;color:var(--orange)">${a}</div>`).join('')}</div>` : ''}

      </div>
      <div class="stat-card" style="border-left:4px solid var(--orange)">
        <div class="stat-label">🟡 Atenção</div>
        <div class="stat-value" style="color:var(--orange)">${atencao.length}</div>
        <div class="stat-sub">Score 40–69</div>

      <div class="stat-card" style="border-left:4px solid var(--green)">

        <div class="stat-sub">Score 70+</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">📊 Média Geral</div>
        <div class="stat-value">${clientes.length ? Math.round(clientes.reduce((a,c)=>a+calcularScore(c),0)/clientes.length) : '—'}</div>
        <div class="stat-sub">Score médio carteira</div>
      </div>
    </div>

    ${criticos.length ? `
      <div class="panel" style="margin-bottom:20px;border-color:rgba(239,68,68,0.3)">
        <div class="panel-header" style="background:rgba(239,68,68,0.07)">
          <span class="panel-title" style="color:var(--red)">🔴 Processos Críticos — Ação Imediata</span>
        </div>
        <div class="panel-body" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
          ${criticos.map(card).join('')}
        </div>
      </div>` : ''}

    ${atencao.length ? `
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-header"><span class="panel-title" style="color:var(--orange)">🟡 Requer Atenção</span></div>
        <div class="panel-body" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">

    ${!clientes.length ? `<div style="text-align:center;padding:80px;color:var(--text3)"><div style="font-size:3rem">🎯</div><div style="margin-top:12px">Nenhum cliente cadastrado.</div></div>` : ''}

// 📅 LINHA DO TEMPO — Histórico visual do processo de cada cliente
// ══════════════════════════════════════════════════════════════════
function renderLinhaDoTempo() {
  const ETAPAS_SERVICO = {
    'Naturalização Brasileira':   ['🔍 Análise de Elegibilidade','📋 Coleta de Documentos','🌐 Tradução Juramentada','📤 Protocolo no MJSP','⚖️ Análise Federal','📰 Publicação no DOU','🎉 Naturalização Concluída'],
    'Autorização de Residência (RNM)':['🔍 Análise Migratória','📋 Coleta de Documentos','💻 Protocolo MigranteWeb','📅 Agendamento PF','🪪 Atendimento na PF','✅ Emissão do CRNM'],
    'Visto de Turismo (EUA)':    ['🔍 Avaliação de Perfil','📝 Preenchimento DS-160','💳 Pagamento MRV','📅 Agendamento Consular','🎤 Entrevista Consular','✈️ Visto Aprovado'],
  };

  const clienteId = window._tlClienteId || (clientes[0]?.id);
  const c = clientes.find(x=>x.id===clienteId) || clientes[0];

  const key = Object.keys(ETAPAS_SERVICO).find(k=>c?.servico?.includes(k.split(' ')[0]));
  const etapas = key ? ETAPAS_SERVICO[key] : ['Etapa 1','Etapa 2','Etapa 3','Etapa 4'];

  return `
    <div style="background:linear-gradient(135deg,rgba(96,165,250,0.08),rgba(201,168,76,0.05));border:1px solid rgba(96,165,250,0.2);border-radius:16px;padding:20px;margin-bottom:24px">
      <div style="font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:6px">📅 Linha do Tempo do Processo</div>
      <div style="font-size:0.82rem;color:var(--text3)">Visualização cronológica do progresso de cada cliente — etapas concluídas, em andamento e pendentes, com histórico de datas e eventos registrados.</div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
      <select id="tl_cliente" style="background:var(--navy2);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;color:var(--text);font-size:0.85rem;flex:1" onchange="window._tlClienteId=parseInt(this.value);navigateTo('linha-do-tempo')">
        ${clientes.map(cli=>`<option value="${cli.id}" ${cli.id===clienteId?'selected':''}>${cli.nome}</option>`).join('')}
      </select>
    </div>

    ${!c ? `<div style="text-align:center;padding:60px;color:var(--text3)">Nenhum cliente cadastrado.</div>` : `
    <!-- Cabeçalho do cliente -->
    <div class="panel" style="margin-bottom:24px">
      <div class="panel-body">
        <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
          <div class="user-avatar" style="width:52px;height:52px;font-size:1rem">${c.nome.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>
          <div style="flex:1">
            <div style="font-size:1.1rem;font-weight:700;color:var(--text)">${c.nome}</div>
            <div style="font-size:0.8rem;color:var(--text3);margin-top:2px">${c.servico} · Responsável: ${c.responsavel}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
              ${statusBadge(c.status)}
              <span class="badge badge-gray">Etapa ${c.etapa}/${c.totalEtapas}</span>
              ${c.pago?'<span class="badge badge-green">✓ Pago</span>':'<span class="badge badge-red">Pagamento Pendente</span>'}
              <span class="badge badge-gray" style="color:var(--gold)">Score ${calcularScore(c)}</span>
            </div>
          </div>
          <div style="text-align:right;font-size:0.8rem;color:var(--text3)">
            Cadastrado em<br><strong style="color:var(--text)">${c.dataCadastro}</strong>
          </div>
        </div>
      </div>
    </div>

    <!-- Timeline vertical -->
    <div class="panel">
      <div class="panel-header"><span class="panel-title">🕐 Etapas do Processo</span></div>
      <div class="panel-body">
        <div style="position:relative;padding-left:40px">
          <!-- linha vertical -->
          <div style="position:absolute;left:18px;top:0;bottom:0;width:2px;background:var(--border2)"></div>

          ${etapas.map((etapa, idx)=>{
            const concluida = idx < c.etapa;
            const atual     = idx === c.etapa - 1;
            const futura    = idx >= c.etapa;
            const cor       = concluida ? 'var(--green)' : atual ? 'var(--gold)' : 'var(--border)';
            const bgDot     = concluida ? '#10b981' : atual ? '#c9a84c' : 'var(--navy3)';
            const evento    = (c.timeline||[])[idx];

            return `
              <div style="position:relative;margin-bottom:28px;padding-bottom:4px">
                <!-- Dot -->
                <div style="position:absolute;left:-31px;top:4px;width:20px;height:20px;border-radius:50%;background:${bgDot};border:3px solid ${cor};display:flex;align-items:center;justify-content:center;font-size:0.55rem;color:#fff;font-weight:800;z-index:2">
                  ${concluida?'✓':atual?'▶':idx+1}
                </div>

                <div style="background:${atual?'rgba(201,168,76,0.07)':concluida?'rgba(16,185,129,0.04)':'var(--navy4)'};border:1px solid ${cor};border-radius:10px;padding:14px">
                  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
                    <div>
                      <span style="font-size:0.83rem;font-weight:${atual?'700':'500'};color:${concluida?'var(--text)':atual?'var(--gold)':'var(--text3)'}">${etapa}</span>
                      ${atual?'<span class="badge badge-blue" style="margin-left:8px;font-size:0.65rem">Em andamento</span>':''}
                      ${concluida?'<span class="badge badge-green" style="margin-left:8px;font-size:0.65rem">Concluído</span>':''}
                    </div>
                    ${concluida && !futura ? `<div style="font-size:0.72rem;color:var(--text3)">${evento?.data||c.dataCadastro||''}</div>` : ''}
                  </div>
                  ${evento?.obs ? `<div style="font-size:0.77rem;color:var(--text3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)">${evento.obs}</div>` : ''}
                  ${atual ? `
                    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
                      <button class="btn btn-gold btn-sm" onclick="registrarEvento(${c.id},${idx})">+ Registrar nota</button>
                      <button class="btn btn-outline btn-sm" onclick="atualizarEtapa(${c.id})">Avançar para próxima etapa ▶</button>
                    </div>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    `}
  `;
}

function registrarEvento(clienteId, etapaIdx) {
  openModal(`
    <div class="modal-title">📝 Registrar Nota na Etapa</div>
    <div class="form-field">
      <label>Observação / Evento</label>
      <textarea id="evt_obs" placeholder="Ex: Documentos recebidos, protocolo feito em 10/03, aguardando retorno do MJSP..." style="min-height:120px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="salvarEvento(${clienteId},${etapaIdx})">💾 Salvar</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function salvarEvento(clienteId, etapaIdx) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  if (!c.timeline) c.timeline = [];
  const obs = document.getElementById('evt_obs').value.trim();
  if (!obs) return;
  c.timeline[etapaIdx] = { data: new Date().toLocaleDateString('pt-BR'), obs };
  saveData();
  closeModal();
  navigateTo('linha-do-tempo');
  showToast('✅ Nota registrada na linha do tempo!');
}

let _docsSalvos = []; // { id, nome, html, texto, data, clienteId }
let _docId = 1;

function renderEditor() {

          <input id="doc-titulo" placeholder="Nome do documento..." value=""
            style="flex:1;background:var(--navy2);border:1px solid var(--border2);border-radius:8px;padding:9px 14px;color:var(--text);font-size:0.9rem;font-weight:600;min-width:180px"
            onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border2)'">
          <select id="doc-cliente" style="background:var(--navy2);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:0.82rem">
            <option value="">— Vincular a cliente (opcional) —</option>
            ${clientes.map(c=>`<option value="${c.id}">${c.nome.split(' ').slice(0,3).join(' ')}</option>`).join('')}
          </select>
          <button class="btn btn-gold" onclick="salvarDocumento()">💾 Salvar</button>
          <button class="btn btn-outline" onclick="imprimirDocumento()">🖨️ Imprimir</button>
          <button class="btn btn-outline" onclick="copiarDocumento()">📋 Copiar</button>
        </div>

        <!-- Toolbar de formatação -->
        <div style="background:var(--navy2);border:1px solid var(--border2);border-radius:10px 10px 0 0;padding:8px 12px;display:flex;gap:4px;flex-wrap:wrap;align-items:center">

          <!-- Fonte e tamanho -->
          <select onchange="execCmd('fontName',this.value)" style="background:var(--navy3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:0.75rem;margin-right:4px">
            <option value="Times New Roman">Times New Roman</option>
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
            <option value="Helvetica">Helvetica</option>
          </select>
          <select onchange="execCmd('fontSize',this.value)" style="background:var(--navy3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:0.75rem;margin-right:8px">
            <option value="2">8px</option>
            <option value="3" selected>10px</option>
            <option value="4">12px</option>
            <option value="5">14px</option>
            <option value="6">18px</option>
            <option value="7">24px</option>
          </select>

          ${[
            ['B','bold','<strong>B</strong>','Negrito'],

            ['U','underline','<u>U</u>','Sublinhado'],
          ].map(([,cmd,lbl,title])=>`<button title="${title}" onclick="execCmd('${cmd}')" style="background:var(--navy3);border:1px solid var(--border2);border-radius:6px;padding:4px 9px;color:var(--text);cursor:pointer;font-size:0.82rem;min-width:28px">${lbl}</button>`).join('')}

          <div style="width:1px;height:22px;background:var(--border2);margin:0 6px"></div>

          ${[
            ['justifyLeft','⬅','Alinhar esquerda'],
            ['justifyCenter','☰','Centralizar'],
            ['justifyRight','➡','Alinhar direita'],
            ['justifyFull','≡','Justificar'],
          ].map(([cmd,lbl,title])=>`<button title="${title}" onclick="execCmd('${cmd}')" style="background:var(--navy3);border:1px solid var(--border2);border-radius:6px;padding:4px 9px;color:var(--text);cursor:pointer;font-size:0.82rem">${lbl}</button>`).join('')}

          <div style="width:1px;height:22px;background:var(--border2);margin:0 6px"></div>

          <button title="Lista com marcadores" onclick="execCmd('insertUnorderedList')" style="background:var(--navy3);border:1px solid var(--border2);border-radius:6px;padding:4px 9px;color:var(--text);cursor:pointer;font-size:0.82rem">• Lista</button>

          </div>
        </div>

        <div style="background:#1a1f2e;border:1px solid var(--border2);border-top:none;border-radius:0 0 10px 10px;padding:12px;flex:1">

            contenteditable="true"

            max-width:760px;margin:0 auto;overflow-y:auto"
          >${texto ? texto.replace(/\n/g,'<br>') : '<p style="color:#999;font-style:italic">Comece a digitar seu documento aqui, ou cole um texto do Gerador de Contratos...</p>'}</div>
        </div>

        <div style="font-size:0.72rem;color:var(--text3);text-align:center;margin-top:8px">

        </div>
      </div>
    </div>
  `;
}

function execCmd(cmd, val) {
  const editor = document.getElementById('doc-editor');
  if (!editor) return;
  editor.focus();
  document.execCommand(cmd, false, val || null);
}

function renderDocsList() {
  if (!_docsSalvos.length) return `<div style="padding:16px;font-size:0.78rem;color:var(--text3);text-align:center">Nenhum documento salvo.</div>`;
  return _docsSalvos.map(d=>`
    <div style="padding:10px 12px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.03)'" onmouseout="this.style.background=''" onclick="abrirDocSalvo(${d.id})">
      <div style="font-size:0.8rem;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.nome}</div>
      <div style="font-size:0.68rem;color:var(--text3);margin-top:2px">${d.data}${d.clienteNome?' · '+d.clienteNome.split(' ')[0]:''}</div>
      <button class="btn btn-danger btn-sm" style="margin-top:6px;width:100%;padding:3px" onclick="event.stopPropagation();excluirDocSalvo(${d.id})">🗑️ Excluir</button>
    </div>`).join('');
}

function novoDocumento() {
  const titulo = document.getElementById('doc-titulo');
  const editor = document.getElementById('doc-editor');
  const cliente = document.getElementById('doc-cliente');
  if (titulo) titulo.value = '';
  if (cliente) cliente.value = '';
  if (editor) editor.innerHTML = '<p style="color:#999;font-style:italic">Comece a digitar seu documento aqui...</p>';
  window._docAtualId = null;
}

function salvarDocumento() {
  const editor = document.getElementById('doc-editor');
  const titulo = document.getElementById('doc-titulo')?.value.trim();
  const clienteId = parseInt(document.getElementById('doc-cliente')?.value)||null;
  if (!editor) return;
  if (!titulo) { showToast('⚠️ Dê um nome ao documento antes de salvar.','warn'); document.getElementById('doc-titulo')?.focus(); return; }

  const html   = editor.innerHTML;
  const texto  = editor.innerText || editor.textContent;
  const data   = new Date().toLocaleDateString('pt-BR');
  const clienteNome = clienteId ? (clientes.find(c=>c.id===clienteId)?.nome||'') : '';

  if (window._docAtualId) {
    const doc = _docsSalvos.find(d=>d.id===window._docAtualId);
    if (doc) { doc.nome=titulo; doc.html=html; doc.texto=texto; doc.data=data; doc.clienteId=clienteId; doc.clienteNome=clienteNome; }
  } else {
    window._docAtualId = _docId;
    _docsSalvos.unshift({ id:_docId++, nome:titulo, html, texto, data, clienteId, clienteNome });
  }

  // Persiste nos dados globais
  try { localStorage.setItem('wb_erp_docs', JSON.stringify(_docsSalvos)); } catch(e) {}
  showToast(`💾 "${titulo}" salvo com sucesso!`);
  const lista = document.getElementById('docs-lista');
  if (lista) lista.innerHTML = renderDocsList();
}

function abrirDocSalvo(id) {
  const doc = _docsSalvos.find(d=>d.id===id);
  if (!doc) return;
  const editor = document.getElementById('doc-editor');
  const titulo = document.getElementById('doc-titulo');
  const cliente = document.getElementById('doc-cliente');
  if (editor) editor.innerHTML = doc.html || (doc.texto||'').replace(/\n/g,'<br>');
  if (titulo) titulo.value = doc.nome;
  if (cliente && doc.clienteId) cliente.value = doc.clienteId;
  window._docAtualId = id;
  showToast(`📂 "${doc.nome}" carregado.`,'info');
}

function excluirDocSalvo(id) {
  const doc = _docsSalvos.find(d=>d.id===id);
  if (!confirm(`Excluir "${doc?.nome}"?`)) return;
  _docsSalvos = _docsSalvos.filter(d=>d.id!==id);
  try { localStorage.setItem('wb_erp_docs', JSON.stringify(_docsSalvos)); } catch(e) {}
  if (window._docAtualId === id) { window._docAtualId = null; novoDocumento(); }
  const lista = document.getElementById('docs-lista');
  if (lista) lista.innerHTML = renderDocsList();
  showToast('🗑️ Documento excluído.','info');
}

function imprimirDocumento() {
  const editor = document.getElementById('doc-editor');
  const titulo = document.getElementById('doc-titulo')?.value || 'Documento WB';
  if (!editor) return;
  const html = editor.innerHTML;
  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>${titulo}</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: 'Times New Roman', serif; font-size: 12px; line-height: 1.8; padding: 50px 60px; color: #111; max-width: 800px; margin: 0 auto; }
      @page { margin: 2cm; }
      @media print { body { padding: 0; } }
    </style>
  </head><body>${html}</body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 400);
}

function copiarDocumento() {
  const editor = document.getElementById('doc-editor');
  if (!editor) return;
  navigator.clipboard.writeText(editor.innerText||editor.textContent)
    .then(()=>showToast('✅ Texto copiado! Cole no Word ou Google Docs.'));
}

// Carrega docs salvos do localStorage ao iniciar
(function carregarDocsSalvos() {
  try {
    const saved = localStorage.getItem('wb_erp_docs');
    if (saved) { _docsSalvos = JSON.parse(saved); _docId = Math.max(..._docsSalvos.map(d=>d.id),0)+1; }
  } catch(e) {}
})();

</script>
