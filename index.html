<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WB ERP">
<meta name="description" content="WB Assessoria Migratória — Sistema de Gestão">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;WB Assessoria Migrat%C3%B3ria&quot;,&quot;short_name&quot;:&quot;WB ERP&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230a0f1e&quot;,&quot;theme_color&quot;:&quot;%230a0f1e&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%230a0f1e'/%3E%3Ctext y='130' x='32' font-size='120' font-family='serif'%3E%F0%9F%87%A7%F0%9F%87%B7%3C/text%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}">
<title>WB Assessoria Migratória — ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0f1e;
    --navy2: #111827;
    --navy3: #1a2235;
    --navy4: #243048;
    --gold: #c9a84c;
    --gold2: #e4c97e;
    --gold3: #f5e4b0;
    --accent: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
    --text: #e8eaf2;
    --text2: #9aa3b8;
    --text3: #5a6380;
    --border: rgba(201,168,76,0.15);
    --border2: rgba(255,255,255,0.06);
    --glass: rgba(26,34,53,0.7);
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--navy); color:var(--text); min-height:100vh; overflow-x:hidden; }
  
  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--navy2); }
  ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; }

  /* ─── LOGIN ─────────────────────────────── */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 60% 80% at 80% 100%, rgba(59,130,246,0.05) 0%, transparent 70%),
                var(--navy);
    position:relative;
  }
  #login-screen::before {
    content:''; position:absolute; inset:0;
    background-image: repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px),
                      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px);
  }
  .login-box {
    background: var(--glass); backdrop-filter:blur(20px);
    border:1px solid var(--border); border-radius:24px;
    padding:60px 56px; width:460px; max-width:95vw;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(201,168,76,0.2);
    position:relative; z-index:1;
  }
  .login-logo { text-align:center; margin-bottom:40px; }
  .login-logo .brand { font-family:'Cormorant Garamond',serif; font-size:2.6rem; font-weight:700; color:var(--gold); letter-spacing:2px; }
  .login-logo .sub { font-size:0.7rem; letter-spacing:4px; color:var(--text2); text-transform:uppercase; margin-top:4px; }
  .login-logo .divider { width:60px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:16px auto; }
  .role-tabs { display:flex; gap:8px; margin-bottom:32px; background:var(--navy2); border-radius:12px; padding:4px; }
  .role-tab { flex:1; padding:10px; text-align:center; border-radius:9px; cursor:pointer; font-size:0.78rem; font-weight:500; letter-spacing:0.5px; color:var(--text3); transition:all 0.25s; border:none; background:transparent; }
  .role-tab.active { background:var(--gold); color:var(--navy); font-weight:600; }
  .form-group { margin-bottom:20px; }
  .form-group label { display:block; font-size:0.75rem; letter-spacing:1px; text-transform:uppercase; color:var(--text2); margin-bottom:8px; }
  .form-group input {
    width:100%; background:var(--navy2); border:1px solid var(--border2);
    border-radius:10px; padding:14px 16px; color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:0.9rem; outline:none; transition:border-color 0.2s;
  }
  .form-group input:focus { border-color:var(--gold); }
  .login-btn {
    width:100%; padding:16px; background:linear-gradient(135deg,var(--gold),#a87f2e);
    border:none; border-radius:12px; color:var(--navy); font-family:'DM Sans',sans-serif;
    font-size:0.9rem; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all 0.25s; margin-top:8px;
    text-transform:uppercase;
  }
  .login-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(201,168,76,0.4); }
  .demo-hint { text-align:center; margin-top:20px; font-size:0.75rem; color:var(--text3); }
  .demo-hint span { color:var(--gold); font-family:'DM Mono',monospace; }

  /* ─── LAYOUT ─────────────────────────────── */
  #app { display:none; flex-direction:row; min-height:100vh; }
  #app.active { display:flex; }

  /* SIDEBAR */
  .sidebar {
    width:260px; min-height:100vh; background:var(--navy2); border-right:1px solid var(--border2);
    display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100;
    transition:transform 0.3s;
  }
  .sidebar-logo { padding:28px 24px 20px; border-bottom:1px solid var(--border2); }
  .sidebar-logo .brand { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:700; color:var(--gold); }
  .sidebar-logo .sub { font-size:0.65rem; letter-spacing:3px; color:var(--text3); text-transform:uppercase; }
  .sidebar-user { padding:16px 24px; border-bottom:1px solid var(--border2); display:flex; align-items:center; gap:12px; }
  .user-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--navy4)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; color:var(--navy); flex-shrink:0; }
  .user-info .name { font-size:0.85rem; font-weight:600; color:var(--text); }
  .user-info .role-badge { font-size:0.65rem; letter-spacing:1px; text-transform:uppercase; color:var(--gold); }
  .sidebar-nav { flex:1; padding:12px 0; overflow-y:auto; }
  .nav-section { padding:8px 24px 4px; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--text3); }
  .nav-item {
    display:flex; align-items:center; gap:12px; padding:11px 24px;
    cursor:pointer; transition:all 0.2s; font-size:0.85rem; color:var(--text2);
    border-left:3px solid transparent; position:relative;
  }
  .nav-item:hover { color:var(--text); background:rgba(255,255,255,0.03); }
  .nav-item.active { color:var(--gold); background:rgba(201,168,76,0.07); border-left-color:var(--gold); }
  .nav-item .icon { width:18px; text-align:center; font-size:1rem; }
  .nav-badge { margin-left:auto; background:var(--gold); color:var(--navy); font-size:0.65rem; font-weight:700; padding:2px 7px; border-radius:10px; }
  .sidebar-bottom { padding:16px 24px; border-top:1px solid var(--border2); }
  .logout-btn { display:flex; align-items:center; gap:10px; color:var(--text3); font-size:0.82rem; cursor:pointer; transition:color 0.2s; background:none; border:none; font-family:'DM Sans',sans-serif; }
  .logout-btn:hover { color:var(--red); }

  /* MAIN */
  .main { margin-left:260px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .topbar {
    padding:18px 32px; border-bottom:1px solid var(--border2); display:flex; align-items:center;
    justify-content:space-between; background:rgba(10,15,30,0.8); backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:50;
  }
  .topbar-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; color:var(--text); }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .notif-btn { width:38px; height:38px; border-radius:10px; background:var(--navy3); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; position:relative; }
  .notif-dot { position:absolute; top:8px; right:8px; width:8px; height:8px; background:var(--gold); border-radius:50%; }
  .content { padding:32px; flex:1; }

  /* ─── CARDS ──────────────────────────────── */
  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:32px; }
  .stat-card {
    background:var(--navy3); border:1px solid var(--border2); border-radius:16px;
    padding:24px; position:relative; overflow:hidden; transition:transform 0.2s;
  }
  .stat-card:hover { transform:translateY(-3px); }
  .stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:16px 16px 0 0; }
  .stat-card.gold::after { background:linear-gradient(90deg,var(--gold),var(--gold2)); }
  .stat-card.blue::after { background:linear-gradient(90deg,#3b82f6,#60a5fa); }
  .stat-card.green::after { background:linear-gradient(90deg,#10b981,#34d399); }
  .stat-card.red::after { background:linear-gradient(90deg,#ef4444,#f87171); }
  .stat-label { font-size:0.72rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:12px; }
  .stat-value { font-family:'Cormorant Garamond',serif; font-size:2.4rem; font-weight:700; color:var(--text); line-height:1; }
  .stat-sub { font-size:0.75rem; color:var(--text3); margin-top:8px; }
  .stat-icon { position:absolute; right:20px; top:20px; font-size:1.8rem; opacity:0.15; }

  /* GRID 2COL */
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:24px; }
  .grid-3 { display:grid; grid-template-columns:2fr 1fr; gap:24px; margin-bottom:24px; }

  /* PANEL */
  .panel {
    background:var(--navy3); border:1px solid var(--border2); border-radius:16px; overflow:hidden;
  }
  .panel-header { padding:20px 24px; border-bottom:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; }
  .panel-title { font-size:0.9rem; font-weight:600; color:var(--text); }
  .panel-body { padding:24px; }

  /* TABLE */
  .tbl { width:100%; border-collapse:collapse; }
  .tbl th { padding:10px 14px; text-align:left; font-size:0.68rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); border-bottom:1px solid var(--border2); }
  .tbl td { padding:14px 14px; font-size:0.82rem; color:var(--text2); border-bottom:1px solid rgba(255,255,255,0.03); }
  .tbl tr:hover td { background:rgba(255,255,255,0.02); color:var(--text); }
  .tbl tr:last-child td { border-bottom:none; }

  /* BADGE */
  .badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; letter-spacing:0.5px; }
  .badge-gold { background:rgba(201,168,76,0.15); color:var(--gold); }
  .badge-green { background:rgba(16,185,129,0.15); color:var(--green); }
  .badge-blue { background:rgba(59,130,246,0.15); color:#60a5fa; }
  .badge-red { background:rgba(239,68,68,0.15); color:#f87171; }
  .badge-orange { background:rgba(245,158,11,0.15); color:var(--orange); }
  .badge-gray { background:rgba(255,255,255,0.07); color:var(--text3); }
  .badge::before { content:'●'; font-size:0.5rem; }

  /* PROGRESS */
  .progress-bar { height:6px; background:var(--navy4); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold),var(--gold2)); transition:width 0.6s ease; }

  /* BTN */
  .btn { padding:10px 20px; border-radius:10px; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; letter-spacing:0.5px; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
  .btn-gold { background:var(--gold); color:var(--navy); }
  .btn-gold:hover { background:var(--gold2); transform:translateY(-1px); }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
  .btn-sm { padding:7px 14px; font-size:0.75rem; }
  .btn-danger { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.2); }

  /* TIMELINE */
  .timeline { position:relative; padding-left:24px; }
  .timeline::before { content:''; position:absolute; left:7px; top:0; bottom:0; width:2px; background:var(--border2); }
  .timeline-item { position:relative; padding-bottom:20px; }
  .timeline-dot { position:absolute; left:-20px; top:4px; width:14px; height:14px; border-radius:50%; background:var(--navy4); border:2px solid var(--text3); }
  .timeline-dot.done { background:var(--gold); border-color:var(--gold); }
  .timeline-dot.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 8px rgba(59,130,246,0.6); }
  .timeline-text { font-size:0.82rem; color:var(--text2); }
  .timeline-date { font-size:0.7rem; color:var(--text3); margin-top:2px; font-family:'DM Mono',monospace; }

  /* FORM */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-field { display:flex; flex-direction:column; gap:6px; }
  .form-field label { font-size:0.72rem; letter-spacing:1px; text-transform:uppercase; color:var(--text3); }
  .form-field input, .form-field select, .form-field textarea {
    background:var(--navy2); border:1px solid var(--border2); border-radius:10px;
    padding:12px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; transition:border-color 0.2s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color:var(--gold); }
  .form-field select option { background:var(--navy2); }
  .form-field textarea { resize:vertical; min-height:90px; }
  .form-full { grid-column:1/-1; }

  /* MESSAGE */
  .msg-list { display:flex; flex-direction:column; gap:10px; }
  .msg-item { background:var(--navy4); border-radius:12px; padding:14px 16px; }
  .msg-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .msg-from { font-size:0.78rem; font-weight:600; color:var(--gold); }
  .msg-time { font-size:0.68rem; color:var(--text3); font-family:'DM Mono',monospace; }
  .msg-text { font-size:0.82rem; color:var(--text2); line-height:1.5; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--navy2); border:1px solid var(--border); border-radius:20px; padding:36px; width:600px; max-width:95vw; max-height:90vh; overflow-y:auto; }
  .modal-title { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:600; margin-bottom:24px; color:var(--gold); }
  .modal-actions { display:flex; gap:12px; margin-top:24px; justify-content:flex-end; }

  /* CHECKLIST */
  .checklist-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border2); }
  .checklist-item:last-child { border-bottom:none; }
  .check-box { width:20px; height:20px; border-radius:5px; border:2px solid var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
  .check-box.checked { background:var(--gold); border-color:var(--gold); }
  .check-label { font-size:0.83rem; color:var(--text2); flex:1; }

  /* KANBAN */
  .kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .kanban-col { background:var(--navy3); border-radius:14px; padding:16px; }
  .kanban-col-title { font-size:0.72rem; letter-spacing:2px; text-transform:uppercase; color:var(--text3); margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .kanban-card { background:var(--navy4); border-radius:10px; padding:14px; margin-bottom:10px; border:1px solid var(--border2); cursor:pointer; transition:all 0.2s; }
  .kanban-card:hover { border-color:var(--gold); transform:translateY(-2px); }
  .kanban-name { font-size:0.83rem; font-weight:600; color:var(--text); margin-bottom:6px; }
  .kanban-service { font-size:0.72rem; color:var(--text3); margin-bottom:8px; }

  /* FINANCE CHART */
  .chart-bar-group { display:flex; align-items:flex-end; gap:8px; height:120px; }
  .chart-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .chart-bar { width:100%; background:linear-gradient(180deg,var(--gold),rgba(201,168,76,0.3)); border-radius:4px 4px 0 0; transition:height 0.6s; min-height:4px; }
  .chart-bar-label { font-size:0.65rem; color:var(--text3); }

  /* PAGE VIEWS */
  .page { display:none; }
  .page.active { display:block; }

  /* CLIENT PORTAL SPECIAL */
  .client-header {
    background: linear-gradient(135deg, var(--navy3), var(--navy4));
    border:1px solid var(--border); border-radius:20px; padding:32px;
    margin-bottom:24px; position:relative; overflow:hidden;
  }
  .client-header::before {
    content:''; position:absolute; right:-60px; top:-60px;
    width:200px; height:200px; border-radius:50%;
    background:radial-gradient(circle,rgba(201,168,76,0.1),transparent 70%);
  }
  .client-name { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; color:var(--gold); }
  .client-process { font-size:0.8rem; color:var(--text3); margin-top:4px; letter-spacing:1px; }

  /* ANIMATIONS */
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .page.active { animation:fadeIn 0.3s ease; }

  /* RESPONSIVE */
  .hamburger { display:none; align-items:center; justify-content:center; width:36px; height:36px; border-radius:8px; background:var(--navy3); border:1px solid var(--border2); cursor:pointer; flex-direction:column; gap:5px; flex-shrink:0; }
  .hamburger span { display:block; width:18px; height:2px; background:var(--text2); border-radius:2px; transition:all 0.2s; }

  @media(max-width:900px) {
    .stat-grid { grid-template-columns:1fr 1fr; }
    .grid-2, .grid-3 { grid-template-columns:1fr; }
    .kanban { grid-template-columns:1fr 1fr; }
  }
  @media(max-width:600px) {
    .sidebar { transform:translateX(-100%); transition:transform 0.3s ease; z-index:300; }
    .sidebar.open { transform:translateX(0); }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:299; }
    .sidebar-overlay.open { display:block; }
    .main { margin-left:0 !important; }
    .stat-grid { grid-template-columns:1fr 1fr; }
    .kanban { grid-template-columns:1fr; }
    .hamburger { display:flex !important; }
    .topbar { padding:12px 16px; }
    .topbar-title { font-size:0.9rem; }
    .content { padding:16px !important; }
    .panel-body { padding:12px !important; }
    .tbl th, .tbl td { padding:8px 10px; font-size:0.75rem; }
    .modal-box { width:95vw !important; max-height:90vh; overflow-y:auto; }
    .form-grid { grid-template-columns:1fr !important; }
    .form-full { grid-column:1 !important; }
    .stat-grid { grid-template-columns:1fr 1fr; gap:10px; }
    .stat-value { font-size:1.4rem; }
    .btn { font-size:0.78rem; padding:8px 14px; }
    #topbar-date { display:none; }
  }

  /* Divider with text */
  .divider-text { display:flex; align-items:center; gap:12px; color:var(--text3); font-size:0.72rem; letter-spacing:1px; text-transform:uppercase; margin:20px 0; }
  .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border2); }

  /* NOTIFICATION PANEL */
  .notif-panel { position:absolute; right:0; top:52px; width:320px; background:var(--navy2); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); z-index:200; display:none; }
  .notif-panel.open { display:block; }
  .notif-item { padding:14px 16px; border-bottom:1px solid var(--border2); }
  .notif-item:last-child { border-bottom:none; }
  .notif-item-title { font-size:0.82rem; font-weight:600; color:var(--text); }
  .notif-item-sub { font-size:0.73rem; color:var(--text3); margin-top:2px; }
</style>
</head>
<body>

<!-- ════════════ LOGIN ════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="brand">WB</div>
      <div class="divider"></div>
      <div class="sub">Assessoria Migratória</div>

// ── Salvar (POST no-cors + localStorage) ─────────────────────────
// ══════════════════════════════════════════════════════════════════
// 💾 SYNC ENGINE — Google Sheets + LocalStorage
// POST usa no-cors (funciona sempre).
// GET usa JSONP — único método que contorna CORS no Apps Script.
// ══════════════════════════════════════════════════════════════════

async function saveData() {
  const payload = getPayload();

  // Sempre salva local primeiro — dados nunca se perdem
  try { localStorage.setItem(LS_KEY, JSON.stringify(payload)); } catch(e) {}

  if (!SHEETS_URL) { setSyncStatus('local'); setTimeout(atualizarNotificacoes,100); return; }
  if (_saving) { _saveQueue = true; return; }
  _saving = true;
  setSyncStatus('saving');

  try {
    // POST com no-cors: Google Apps Script aceita, sem CORS
    await fetch(SHEETS_URL, {
      method : 'POST',
      mode   : 'no-cors',
      body   : JSON.stringify(payload)
    });
    setSyncStatus('ok');
  } catch(e) {
    // Offline — dados já estão no localStorage, sincroniza quando voltar
    setSyncStatus('error');
    console.warn('[WB] save error:', e.message);
  } finally {
    _saving = false;
    if (_saveQueue) { _saveQueue = false; saveData(); }
    setTimeout(atualizarNotificacoes, 100);
  }
}

// JSONP — contorna o bloqueio de CORS no GET do Apps Script
function loadFromSheets() {
  return new Promise(resolve => {
    if (!SHEETS_URL) { resolve(false); return; }
    setSyncStatus('loading');

    const cb    = '__wbCb' + Date.now();
    const sc    = document.createElement('script');
    let   done  = false;

    const fim = (ok) => {
      if (done) return; done = true;
      clearTimeout(timer);
      try { document.head.removeChild(sc); } catch(e){}
      try { delete window[cb]; } catch(e){}
      resolve(ok);
    };

    const timer = setTimeout(() => {
      console.warn('[WB] Sheets timeout — usando cache local');
      setSyncStatus('error');
      loadFromLocalStorage();
      fim(false);
    }, 15000);

    window[cb] = (json) => {
      try {
        if (json && json.ok && json.data) {
          applyData(json.data);
          try { localStorage.setItem(LS_KEY, JSON.stringify(json.data)); } catch(e){}
          setSyncStatus('ok');
          fim(true);
        } else if (json && json.ok) {
          // Sheets vazio (primeira vez): sobe dados locais
          setSyncStatus('ok');
          fim(true);
          saveData();
        } else {
          setSyncStatus('error');
          loadFromLocalStorage();
          fim(false);
        }
      } catch(e) {
        setSyncStatus('error');
        loadFromLocalStorage();
        fim(false);
      }
    };

    sc.onerror = () => { setSyncStatus('error'); loadFromLocalStorage(); fim(false); };
    sc.src = SHEETS_URL + '?action=load&callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(sc);
  });
}

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { applyData(JSON.parse(raw)); return true; }
  } catch(e) {}
  return false;
}

function setSyncStatus(s) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    ok:      { icon:'☁️', tip:'Sincronizado com Google Sheets', color:'var(--green)'  },
    saving:  { icon:'🔄', tip:'Salvando no Sheets...',           color:'var(--gold)'   },
    loading: { icon:'⏳', tip:'Carregando do Sheets...',         color:'var(--gold)'   },
    error:   { icon:'⚠️', tip:'Sheets indisponível — dados locais OK', color:'var(--orange)'},
    local:   { icon:'💾', tip:'Armazenamento local',             color:'var(--text3)'  },
  };
  const st = map[s] || map.local;
  el.innerHTML = st.icon;
  el.title     = st.tip;
  el.style.color = st.color;
}

}

// Aplica máscara a um input pelo padrão
function mascara(el, fn) {
  if (!el) return;
  el.addEventListener('input', function(e) {
    const pos  = this.selectionStart;
    const prev = this.value.length;
    this.value = fn(this.value);
    const diff = this.value.length - prev;
    this.setSelectionRange(pos + diff, pos + diff);
  });
}

// Funções de formatação
const fmt = {
  tel: v => {
    v = v.replace(/\D/g,'').slice(0,11);
    if (v.length <= 2)  return `(${v}`;
    if (v.length <= 6)  return `(${v.slice(0,2)}) ${v.slice(2)}`;
    if (v.length <= 10) return `(${v.slice(0,2)}) ${v.slice(2,6)}-${v.slice(6)}`;
    return `(${v.slice(0,2)}) ${v.slice(2,3)} ${v.slice(3,7)}-${v.slice(7)}`;
  },
  cpf: v => {
    v = v.replace(/\D/g,'').slice(0,11);
    if (v.length <= 3)  return v;
    if (v.length <= 6)  return `${v.slice(0,3)}.${v.slice(3)}`;
    if (v.length <= 9)  return `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6)}`;
    return `${v.slice(0,3)}.${v.slice(3,6)}.${v.slice(6,9)}-${v.slice(9)}`;
  },
  cnpj: v => {
    v = v.replace(/\D/g,'').slice(0,14);
    if (v.length <= 2)  return v;
    if (v.length <= 5)  return `${v.slice(0,2)}.${v.slice(2)}`;
    if (v.length <= 8)  return `${v.slice(0,2)}.${v.slice(2,5)}.${v.slice(5)}`;
    if (v.length <= 12) return `${v.slice(0,2)}.${v.slice(2,5)}.${v.slice(5,8)}/${v.slice(8)}`;
    return `${v.slice(0,2)}.${v.slice(2,5)}.${v.slice(5,8)}/${v.slice(8,12)}-${v.slice(12)}`;
  },
  cep: v => {
    v = v.replace(/\D/g,'').slice(0,8);
    if (v.length <= 5) return v;
    return `${v.slice(0,5)}-${v.slice(5)}`;
  },
  data: v => {
    v = v.replace(/\D/g,'').slice(0,8);
    if (v.length <= 2)  return v;
    if (v.length <= 4)  return `${v.slice(0,2)}/${v.slice(2)}`;
    return `${v.slice(0,2)}/${v.slice(2,4)}/${v.slice(4)}`;
  },
  moeda: v => {
    v = v.replace(/\D/g,'');
    if (!v) return '';
    const n = parseInt(v, 10) / 100;
    return n.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
  },
  passaporte: v => v.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,9),
};

// Aplica máscaras em todos os campos via data-mask attribute
function aplicarMascaras(ctx) {
  const root = ctx || document;
  root.querySelectorAll('[data-mask]').forEach(el => {
    const tipo = el.dataset.mask;
    if (fmt[tipo]) mascara(el, fmt[tipo]);
  });
}

// Observer: aplica máscaras em novos elementos adicionados ao DOM (modais)
const _maskObserver = new MutationObserver(muts => {
  muts.forEach(m => m.addedNodes.forEach(n => {
    if (n.nodeType === 1) {
      aplicarMascaras(n);
      n.querySelectorAll && aplicarMascaras(n);
    }
  }));
});
_maskObserver.observe(document.body, { childList: true, subtree: true });

function setRole(r) {
  currentRole = r;
  document.querySelectorAll('.role-tab').forEach((t,i) => {
    const roles = ['ceo','colaborador','cliente'];
    t.classList.toggle('active', roles[i] === r);
  });
  // Limpa campos ao trocar de perfil
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value  = '';
  document.getElementById('login-erro').style.display = 'none';
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-pass').value;
  const erro  = document.getElementById('login-erro');

  const user = autenticar(email, senha, currentRole);

  if (!user) {
    erro.style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }

  // Bloqueia acesso por role incorreta (colaborador tentando entrar como Diretor)
  if (currentRole === 'ceo' && user.role !== 'ceo') {
    erro.textContent = 'Acesso negado para este perfil.';
    erro.style.display = 'block';
    return;
  }
  if (currentRole === 'colaborador' && user.role === 'ceo') {
    // CEO pode entrar pela aba colaborador também — libera
  }

  erro.style.display = 'none';
  currentUser = user;
  currentRole = user.role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('user-avatar').textContent = currentUser.avatar;
  document.getElementById('user-name').textContent   = currentUser.name;
  document.getElementById('user-role').textContent   = currentUser.roleLabel;
  buildNav();
  setDate();
  navigateTo(getDefaultPage());
  setTimeout(atualizarNotificacoes, 400);
}

  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('active');

// ── E-mail via EmailJS ────────────────────────────────────────────
// Configure sua conta em emailjs.com (gratuito até 200 emails/mês)
const EMAILJS_SERVICE  = '';  // Ex: 'service_abc123'
const EMAILJS_TEMPLATE = '';  // Ex: 'template_xyz456'
const EMAILJS_PUBLIC   = '';  // Sua Public Key do EmailJS

async function enviarEmailCliente(para, nomeCliente, assunto, mensagem) {
  if (!EMAILJS_SERVICE) {
    showToast('⚠️ Configure o EmailJS em Configurações para enviar e-mails.', 'warn');
    return false;
  }
  try {
    const resp = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id: EMAILJS_SERVICE,
        template_id: EMAILJS_TEMPLATE,
        user_id: EMAILJS_PUBLIC,
        template_params: { to_email: para, to_name: nomeCliente, subject: assunto, message: mensagem, from_name: 'WB Assessoria Migratória' }
      })
    });
    if (resp.ok) { showToast(`📧 E-mail enviado para ${nomeCliente}!`); return true; }
    else         { showToast('❌ Falha ao enviar e-mail.', 'error'); return false; }
  } catch(e) {
    showToast('❌ Erro ao enviar e-mail.', 'error'); return false;
  }
}

function renderDashboard() {

  const receitaTotal= clientes.filter(c=>c.pago).reduce((a,b)=>a+b.valor,0);

  // Gráfico de receita mensal dinâmico (últimos 6 meses com clientes pagos)
  const porMes = {};
  clientes.forEach(c => {
    if (!c.pago || !c.dataCadastro) return;
    const p = c.dataCadastro.split('/');
    if (p.length < 3) return;
    const key = `${p[2]}${p[1].padStart(2,'0')}`;
    const label = MESES_PT[parseInt(p[1])-1];
    if (!porMes[key]) porMes[key] = { mes: label, receita: 0 };
    porMes[key].receita += c.valor || 0;
  });
  const grafico  = Object.entries(porMes).sort((a,b)=>a[0]>b[0]?1:-1).slice(-6).map(e=>e[1]);

    <thead><tr><th>Cliente</th><th>Serviço</th><th>Status</th><th>Responsável</th><th>Valor</th><th>Pgto</th><th>Ações</th></tr></thead>
    <tbody>
      ${lista.map(c=>`
        <tr>
          <td>
            <div style="font-weight:600;color:var(--text)">${c.nome}</div>
            <div style="font-size:0.72rem;color:var(--text3)">${c.email}</div>
          </td>
          <td style="font-size:0.78rem">${servicoBadge(c.servico)}</td>
          <td>${statusBadge(c.status)}</td>
          <td style="font-size:0.8rem">${c.responsavel}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--gold)">R$ ${c.valor.toLocaleString('pt-BR')}</td>
          <td>${c.pago ? '<span class="badge badge-green">✓ Pago</span>' : '<span class="badge badge-red">Pendente</span>'}</td>
          <td style="display:flex;gap:5px">
            <button class="btn btn-outline btn-sm" onclick="openClienteModal(${c.id})">Detalhes</button>
            ${c.tel && c.tel !== '—' ? `<button class="btn btn-sm" style="background:#25d366;color:#fff;border:none" title="WhatsApp" onclick="whatsAppCliente(${c.id})">💬</button>` : ''}
          </td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function filterClientes(q) {
  const lista = clientes.filter(c => c.nome.toLowerCase().includes(q.toLowerCase()) || c.email.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('tabela-clientes').innerHTML = tabelaClientes(lista);
}
function filterClienteStatus(s) {
  const lista = s ? clientes.filter(c=>c.status===s) : clientes;
  document.getElementById('tabela-clientes').innerHTML = tabelaClientes(lista);
}

// ─── FINANCEIRO ───
function renderFinanceiro() {
  const totalReceita = clientes.reduce((a,c)=>a+(c.pago?c.valor:0),0);
  const totalPendente= clientes.reduce((a,c)=>a+(!c.pago?c.valor:0),0);
  const totalGeral   = clientes.reduce((a,c)=>a+(c.valor||0),0);
  const pagos        = clientes.filter(c=>c.pago).length;

  // Agrupa receitas por mês a partir dos clientes pagos
  const porMes = {};
  clientes.forEach(c => {
    if (!c.pago || !c.dataCadastro) return;
    const partes = c.dataCadastro.split('/');
    if (partes.length < 3) return;
    const key = `${partes[1]}/${partes[2]}`; // MM/AAAA
    const mes = MESES_PT[parseInt(partes[1])-1] + ' ' + partes[2].slice(2);
    if (!porMes[key]) porMes[key] = { mes, receita:0, ordem: parseInt(partes[2])*100+parseInt(partes[1]) };
    porMes[key].receita += c.valor||0;
  });
  const grafico = Object.values(porMes).sort((a,b)=>a.ordem-b.ordem).slice(-6);
  const maxR = grafico.length ? Math.max(...grafico.map(f=>f.receita), 1) : 1;

  return `
    <div class="stat-grid">
      <div class="stat-card gold"><div class="stat-icon">💰</div><div class="stat-label">Total Recebido</div><div class="stat-value">R$${totalReceita.toLocaleString('pt-BR')}</div><div class="stat-sub">${pagos} cliente${pagos!==1?'s':''} pagos</div></div>
      <div class="stat-card red"><div class="stat-icon">⏳</div><div class="stat-label">A Receber</div><div class="stat-value">R$${totalPendente.toLocaleString('pt-BR')}</div><div class="stat-sub">${clientes.filter(c=>!c.pago).length} cliente${clientes.filter(c=>!c.pago).length!==1?'s':''} pendentes</div></div>
      <div class="stat-card green"><div class="stat-icon">📋</div><div class="stat-label">Volume Total Contratos</div><div class="stat-value">R$${totalGeral.toLocaleString('pt-BR')}</div><div class="stat-sub">${clientes.length} processo${clientes.length!==1?'s':''}</div></div>
      <div class="stat-card blue"><div class="stat-icon">📊</div><div class="stat-label">Taxa de Recebimento</div><div class="stat-value">${totalGeral>0?Math.round(totalReceita/totalGeral*100):0}%</div><div class="stat-sub">do total contratado</div></div>
    </div>

    ${grafico.length > 0 ? `
    <div class="panel" style="margin-bottom:24px">
      <div class="panel-header"><span class="panel-title">Receitas por Mês</span></div>
      <div class="panel-body">
        <div style="display:flex;gap:12px;align-items:flex-end;height:160px">
          ${grafico.map(f=>`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end">
              <div style="font-size:0.65rem;color:var(--gold)">R$${(f.receita/1000).toFixed(1)}k</div>
              <div style="width:100%;background:linear-gradient(180deg,var(--gold),rgba(201,168,76,0.4));border-radius:4px 4px 0 0;height:${Math.round(f.receita/maxR*130)}px"></div>
              <div style="font-size:0.65rem;color:var(--text3)">${f.mes}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>` : `
    <div class="panel" style="margin-bottom:24px">
      <div class="panel-body" style="text-align:center;padding:40px;color:var(--text3)">
        <div style="font-size:2rem;margin-bottom:12px">📊</div>
        <div>Nenhum dado financeiro ainda. Cadastre clientes com pagamentos para ver o gráfico.</div>
      </div>
    </div>`}

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Situação de Pagamentos</span></div>
      <div class="panel-body" style="padding:0">
        ${clientes.length === 0
          ? `<div style="text-align:center;padding:32px;color:var(--text3)">Nenhum cliente cadastrado.</div>`
          : `<table class="tbl">
          <thead><tr><th>Cliente</th><th>Serviço</th><th>Valor</th><th>Status</th><th>Ação</th></tr></thead>
          <tbody>
            ${clientes.map(c=>`
              <tr>
                <td style="font-size:0.8rem;font-weight:500">${c.nome.split(' ').slice(0,2).join(' ')}</td>
                <td style="font-size:0.75rem">${servicoBadge(c.servico)}</td>
                <td style="font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--gold)">R$ ${(c.valor||0).toLocaleString('pt-BR')}</td>
                <td>${c.pago ? '<span class="badge badge-green">✅ Pago</span>' : '<span class="badge badge-red">⚠️ Pendente</span>'}</td>
                <td>${!c.pago ? `<button class="btn btn-sm btn-gold" onclick="marcarClientePago(${c.id})">Marcar Pago</button>` : ''}</td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  `;
}

function marcarClientePago(id) {
  const c = clientes.find(x=>x.id===id);
  if (!c) return;
  if (!confirm(`Confirmar pagamento de R$ ${(c.valor||0).toLocaleString('pt-BR')} do cliente "${c.nome}"?`)) return;
  c.pago = true;
  saveData();
  navigateTo('financeiro');
  showToast(`✅ Pagamento de ${c.nome.split(' ')[0]} confirmado!`);
}

function openEditarAgendamento(id) {
  const a = agendamentos.find(x=>x.id===id);
  if (!a) return;
  const respOptions = colaboradores.filter(c=>c.status==='ativo').map(c=>`<option ${c.nome===a.colaborador?'selected':''}>${c.nome}</option>`).join('');
  // Convert dd/mm/yyyy to yyyy-mm-dd for input
  const dataISO = a.data.split('/').reverse().join('-');
  openModal(`
    <div class="modal-title">✏️ Editar Agendamento</div>
    <div class="form-grid">
      <div class="form-field"><label>Data</label><input id="ea_data" type="date" value="${dataISO}"></div>
      <div class="form-field"><label>Hora</label><input id="ea_hora" type="time" value="${a.hora}"></div>
      <div class="form-field"><label>Cliente</label>
        <select id="ea_cliente">${clientes.map(c=>`<option ${c.nome===a.cliente?'selected':''}>${c.nome}</option>`).join('')}</select>
      </div>
      <div class="form-field"><label>Tipo</label>
        <select id="ea_tipo">
          ${['Consulta Inicial','Entrega de Documentos','Atualização de Processo','Entrevista Preparatória','Reunião Interna'].map(t=>`<option ${t===a.tipo?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-field"><label>Colaborador</label><select id="ea_resp">${respOptions}</select></div>
      <div class="form-field form-full"><label>Observações</label><textarea id="ea_obs">${a.obs||''}</textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="salvarEdicaoAgendamento(${id})">💾 Salvar</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function salvarEdicaoAgendamento(id) {
  const a = agendamentos.find(x=>x.id===id);
  if (!a) return;
  const dataRaw = document.getElementById('ea_data').value;
  if (dataRaw) a.data = new Date(dataRaw).toLocaleDateString('pt-BR');
  a.hora        = document.getElementById('ea_hora').value || a.hora;
  a.cliente     = document.getElementById('ea_cliente').value;
  a.tipo        = document.getElementById('ea_tipo').value;
  a.colaborador = document.getElementById('ea_resp').value;
  a.obs         = document.getElementById('ea_obs').value.trim();
  saveData();
  closeModal();
  navigateTo('agendamentos');
}

function excluirAgendamento(id) {
  if (!confirm('Deseja excluir este agendamento?')) return;
  agendamentos = agendamentos.filter(x=>x.id!==id);
  saveData();
  navigateTo('agendamentos');
}

  const msg    = `Olá! Sou ${nome1} e gostaria de falar sobre meu processo de ${c.servico} na WB Assessoria Migratória.`;
  const concluido = c.status === 'Concluído';

  // Prazo estimado por etapa (meses médios por serviço)
  const prazosMedios = { 'Naturaliz': [18,24], 'RNM': [4,8], 'Visto': [2,4] };
  const chavePrazo   = Object.keys(prazosMedios).find(k => c.servico?.includes(k)) || 'Naturaliz';
  const [pMin, pMax] = prazosMedios[chavePrazo];
  const etapasRestantes = (c.totalEtapas||6) - (c.etapa||0);
  const mesesRest = Math.round(etapasRestantes / (c.totalEtapas||6) * pMax);
  const prevMin = new Date(); prevMin.setMonth(prevMin.getMonth() + Math.max(1, mesesRest - 2));
  const prevMax = new Date(); prevMax.setMonth(prevMax.getMonth() + mesesRest + 2);
  const fmtMes = d => d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  return `

    <div class="client-header" style="margin-bottom:24px">

          <div class="progress-fill" style="width:${pct}%;border-radius:6px;transition:width 0.8s ease"></div>

        ${!concluido ? `<div style="font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:8px">
          📅 Previsão estimada: <strong style="color:rgba(255,255,255,0.9)">${fmtMes(prevMin)} – ${fmtMes(prevMax)}</strong>
          <span style="opacity:0.7"> (prazo médio, sujeito ao governo)</span>
        </div>` : `<div style="font-size:0.82rem;color:#4ade80;margin-top:8px;font-weight:700">🎉 Processo concluído! Parabéns!</div>`}
      </div>
    </div>

    <!-- Botão WhatsApp -->
    <button onclick="abrirWhatsAppWB(${JSON.stringify(msg)})"
      style="display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#128c7e,#25d366);
      border:none;border-radius:14px;padding:16px 22px;cursor:pointer;margin-bottom:24px;width:100%;

function renderMeuFinanceiro() {
  const c = clienteLogado();
  if (!c) return `<div style="text-align:center;padding:60px;color:var(--text3)">Processo não encontrado. ${barraWhatsApp('','')}</div>`;

  const nParcelas   = c.parcelas || 0;
  const vlrParcela  = c.valorParcela || (nParcelas>0 ? (total-entrada)/nParcelas : 0);

  const parcelasReg = c.parcelasRegistradas || []; // {n, paga, data}
  const totalPago   = entrada + parcelasReg.filter(p=>p.paga).reduce((s,p)=>s+vlrParcela,0);
  const totalPend   = total - totalPago;

  // Gera QR code PIX via API pública do gerarqrcodepix

        <div><div style="font-size:0.7rem;color:rgba(255,255,255,0.5);margin-bottom:3px">Pendente</div>
          <div style="font-size:1rem;font-weight:700;color:${totalPend>0?'var(--orange)':'#4ade80'}">${fmtMoeda(Math.max(0,totalPend))}</div></div>
        ${nParcelas>0?`<div><div style="font-size:0.7rem;color:rgba(255,255,255,0.5);margin-bottom:3px">Parcelas</div>
          <div style="font-size:1rem;font-weight:700;color:#fff">${nParcelas}x de ${fmtMoeda(vlrParcela)}</div></div>`:''}
      </div>
      <div style="margin-top:16px;background:rgba(255,255,255,0.08);border-radius:8px;height:8px">
        <div style="background:linear-gradient(90deg,#4ade80,var(--gold));border-radius:8px;height:100%;width:${total>0?Math.min(100,(totalPago/total*100)):0}%;transition:width 1s"></div>
      </div>
      <div style="font-size:0.7rem;color:rgba(255,255,255,0.4);margin-top:4px">${total>0?Math.round(totalPago/total*100):0}% quitado</div>
    </div>

    <div class="grid-2">
      <!-- PIX -->
      <div class="panel" style="border-color:rgba(79,209,197,0.3)">
        <div class="panel-header" style="background:rgba(79,209,197,0.06)">
          <span class="panel-title" style="color:#4fc3f7">💳 Pagar via PIX</span>
        </div>
        <div class="panel-body">
          <div style="text-align:center;padding:10px 0">
            <div style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">Chave PIX da WB Assessoria</div>
            <div style="background:var(--navy3);border:2px solid rgba(79,195,247,0.3);border-radius:12px;padding:14px;margin-bottom:14px">

            </div>
            <button onclick="navigator.clipboard.writeText('${pixKey}').then(()=>showToast('📋 Chave PIX copiada!'))"
              style="width:100%;background:linear-gradient(135deg,#0284c7,#0ea5e9);color:#fff;border:none;border-radius:10px;
              padding:12px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-bottom:10px">
              📋 Copiar chave PIX
            </button>
            <button onclick="abrirWhatsAppWB(${JSON.stringify(msgPix)})"
              style="width:100%;background:#25d366;color:#fff;border:none;border-radius:10px;
              padding:11px;font-size:0.85rem;font-weight:600;cursor:pointer">
              💬 Avisar WB após o pagamento
            </button>
          </div>

            ⚠️ Após realizar o PIX, envie o comprovante para a WB pelo WhatsApp para confirmação.
          </div>
        </div>
      </div>

      <!-- Histórico de parcelas -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📋 Histórico de Pagamentos</span></div>
        <div class="panel-body">
          ${entrada > 0 ? `
          <div style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(16,185,129,0.06);border-radius:8px;margin-bottom:8px;border:1px solid rgba(16,185,129,0.2)">
            <span style="font-size:1rem">✅</span>
            <div style="flex:1">
              <div style="font-size:0.82rem;font-weight:600">Entrada</div>
              <div style="font-size:0.72rem;color:var(--text3)">Pago no contrato</div>
            </div>
            <div style="font-size:0.88rem;font-weight:700;color:var(--green)">${fmtMoeda(entrada)}</div>
          </div>` : ''}

          ${nParcelas > 0 ? Array.from({length:nParcelas},(_,i)=>{
            const reg  = parcelasReg.find(p=>p.n===i+1);
            const paga = reg?.paga || false;
            return `
            <div style="display:flex;align-items:center;gap:10px;padding:10px;background:${paga?'rgba(16,185,129,0.06)':'rgba(251,146,60,0.05)'};
              border-radius:8px;margin-bottom:6px;border:1px solid ${paga?'rgba(16,185,129,0.2)':'rgba(251,146,60,0.2)'}">
              <span style="font-size:1rem">${paga?'✅':'⏳'}</span>
              <div style="flex:1">
                <div style="font-size:0.82rem;font-weight:600">${i+1}ª Parcela</div>
                <div style="font-size:0.72rem;color:var(--text3)">${paga?(reg?.data||'Pago'):'Pendente'}</div>
              </div>
              <div style="font-size:0.88rem;font-weight:700;color:${paga?'var(--green)':'var(--orange)'}">${fmtMoeda(vlrParcela)}</div>
            </div>`; }).join('')
          : nParcelas===0 ? `<div style="text-align:center;padding:16px;color:var(--green);font-size:0.85rem">

      </div>
    </div>
    ${barraWhatsApp(c.nome, c.servico)}
  `;
}

function hoverAvaliacao(n) {
  [1,2,3,4,5].forEach(i=>{
    const el = document.getElementById('av_star_'+i);
    if(el) el.textContent = i<=n?'⭐':'☆';
  });
}
function renderEstrelas(n) {
  [1,2,3,4,5].forEach(i=>{
    const el = document.getElementById('av_star_'+i);
    if(el) { el.textContent=i<=n?'⭐':'☆'; }
  });

function setAvaliacao(n) {

  if(el) el.textContent = labels[n];

function salvarAvaliacao(clienteId) {
  if (!_avaliacaoTemp.estrelas) { showToast('⚠️ Selecione uma nota!','warn'); return; }
  const texto = document.getElementById('av_texto')?.value?.trim() || '';
  if (!texto) { showToast('⚠️ Escreva um comentário!','warn'); return; }
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  c.avaliacao = { estrelas: _avaliacaoTemp.estrelas, texto, data: new Date().toLocaleDateString('pt-BR') };
  saveData();
  showToast('🌟 Avaliação enviada! Muito obrigado!');

}

function salvarChecklistDocs(clienteId, docsPadrao) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  const pendentes = docsPadrao.filter(d => {
    const el = document.getElementById('chk_doc_'+d.replace(/[^a-z0-9]/gi,'_'));
    return el?.checked;
  });
  const custom = document.getElementById('chk_doc_custom')?.value?.trim();
  if (custom) pendentes.push(custom);
  c.docsPendentes = pendentes;
  saveData();
  closeModal();
  showToast(`✅ ${pendentes.length} documento(s) marcado(s) como pendente(s).`);
  navigateTo(currentPage);
  // Notifica cliente via WA
  if (pendentes.length > 0) {
    const tel  = (c.tel||'').replace(/\D/g,'');
    const fone = tel.length>=10 ? (tel.startsWith('55')?tel:'55'+tel) : null;
    if (fone && confirm(`Notificar ${c.nome} dos documentos pendentes via WhatsApp?`)) {
      const lista = pendentes.map((d,i)=>`${i+1}. ${d}`).join('\n');
      const msg   = `Olá, ${c.nome.split(' ')[0]}! 👋\n\nA equipe WB identificou que os seguintes documentos ainda precisam ser entregues para seu processo de *${c.servico}*:\n\n${lista}\n\nVocê pode enviar os PDFs diretamente pelo seu portal ou entrar em contato conosco.\n\n_WB Assessoria Migratória — (11) 91425-8886_`;
      const a = document.createElement('a'); a.href=`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`; a.target='_blank'; a.rel='noopener';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }
  }
}

function salvarEdicaoCliente(id) {
  const c = clientes.find(x=>x.id===id);
  if (!c) return;
  c.nome        = document.getElementById('ec2_nome').value.trim()  || c.nome;
  c.email       = document.getElementById('ec2_email').value.trim() || c.email;
  c.tel         = document.getElementById('ec2_tel').value.trim()   || '—';
  c.cpf         = document.getElementById('ec2_cpf').value.trim()   || '—';
  c.pais        = document.getElementById('ec2_pais').value.trim()  || '—';
  c.dataNascimento = document.getElementById('ec2_nasc')?.value?.trim() || c.dataNascimento || '';
  c.indicadoPor    = document.getElementById('ec2_indicado')?.value?.trim() || c.indicadoPor || '';
  // Garante código de indicação próprio
  if (!c.codigoIndicacao) c.codigoIndicacao = gerarCodigoIndicacao(c.nome);
  c.servico     = document.getElementById('ec2_servico').value;
  c.status      = document.getElementById('ec2_status').value;
  c.responsavel = document.getElementById('ec2_resp').value;
  c.valor       = parseFloat(document.getElementById('ec2_valor').value) || c.valor;
  c.pago        = document.getElementById('ec2_pago').value === 'true';
  c.obs         = document.getElementById('ec2_obs').value.trim();
  // Portal
  c.portalLogin = document.getElementById('ec2_portal_login').value.trim() || c.email;
  c.portalSenha = document.getElementById('ec2_portal_senha').value.trim() || c.portalSenha;
  // Curso
  c.cursoLogin  = document.getElementById('ec2_curso_login').value.trim();
  c.cursoSenha  = document.getElementById('ec2_curso_senha').value.trim();
  c.cursoLink   = document.getElementById('ec2_curso_link').value.trim();
  // Salva link como padrão global se preenchido
  if (c.cursoLink && !configEmpresa.cursoLink) configEmpresa.cursoLink = c.cursoLink;
  saveData();
  closeModal();
  navigateTo(currentPage);
  showToast('✅ Cliente atualizado com sucesso!');
}

function copiarCredenciaisPortal(nome, login, senha) {
  const url   = window.location.href.split('?')[0];
  const texto = `Olá, ${nome}! 👋\n\nSuas credenciais de acesso ao Portal WB Assessoria Migratória:\n\n🔗 Link: ${url}\n👤 Login: ${login}\n🔑 Senha: ${senha}\n\nAtravés do portal você acompanha todas as etapas do seu processo em tempo real.\n\nQualquer dúvida, estamos no WhatsApp: (11) 91425-8886`;
  navigator.clipboard.writeText(texto).then(()=>showToast('📋 Credenciais copiadas! Cole no e-mail ou WhatsApp.')).catch(()=>showToast('⚠️ Erro ao copiar. Tente manualmente.','warn'));
}

function enviarCredenciaisWhatsApp(nome, login, senha, tel) {
  const url   = window.location.href.split('?')[0];
  const msg   = `Olá, ${nome}! 👋\n\nSuas credenciais de acesso ao Portal WB:\n\n🔗 ${url}\n👤 Login: ${login}\n🔑 Senha: ${senha}\n\nQualquer dúvida: (11) 91425-8886`;
  const num   = tel ? tel.replace(/\D/g,'') : WB_WHATSAPP;
  const fone  = num.length >= 10 ? (num.startsWith('55') ? num : '55'+num) : WB_WHATSAPP;
  window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`, '_blank');
}

function excluirCliente(id) {
  const c = clientes.find(x=>x.id===id);
  if (!c) return;
  if (!confirm(`Deseja realmente excluir o cliente "${c.nome}"? Esta ação não pode ser desfeita.`)) return;
  clientes = clientes.filter(x=>x.id!==id);
  saveData();
  closeModal();
  navigateTo('clientes');
}

function uploadDocPendente(clienteId, docNome, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.type !== 'application/pdf') { showToast('⚠️ Apenas arquivos PDF são aceitos!','warn'); input.value=''; return; }
  if (file.size > 10*1024*1024)        { showToast('⚠️ Arquivo muito grande. Máximo 10MB.','warn');    input.value=''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    const c = clientes.find(x=>x.id===clienteId);
    if (!c) return;
    c.docsEnviados = c.docsEnviados || [];
    // Remove envio anterior do mesmo doc se existir
    c.docsEnviados = c.docsEnviados.filter(d => d.docNome !== docNome);
    c.docsEnviados.push({
      docNome, arquivo: file.name,
      data: new Date().toLocaleDateString('pt-BR'),
      base64: e.target.result,
      tamanho: file.size,
    });
    saveData();
    showToast(`✅ "${file.name}" enviado com sucesso!`);
    navigateTo('meus-documentos');
    // Avisa WB automaticamente via WhatsApp
    setTimeout(()=>{
      const nome1 = c.nome.split(' ')[0];
      const msg = `📄 *Novo documento enviado pelo cliente!*\n\nCliente: ${c.nome}\nDocumento: ${docNome}\nArquivo: ${file.name}\n\nAcesse o sistema para visualizar.`;
      // Notifica internamente apenas — não abre WA automaticamente para não atrapalhar cliente
    },300);
  };
  reader.readAsDataURL(file);
}

function atualizarEtapa(id) {
  const c = clientes.find(x=>x.id===id);
  if (c && c.etapa < c.totalEtapas) {
    c.etapa++;
    if (c.etapa >= c.totalEtapas) c.status = 'Concluído';
    saveData();
    closeModal();
    openClienteModal(id);
    navigateTo(currentPage);
    // 🔔 Alerta WhatsApp automático para o cliente
    const etapas   = getEtapasCliente(c.servico);
    const etapaAtual = etapas[c.etapa-1]?.label || `Etapa ${c.etapa}`;
    const nomeCliente = c.nome.split(' ')[0];
    const tel = (c.tel||'').replace(/\D/g,'');
    const fone = tel.length>=10 ? (tel.startsWith('55')?tel:'55'+tel) : null;
    if (fone) {
      const msg = `Olá, ${nomeCliente}! 🎉\n\nSeu processo de *${c.servico}* avançou para uma nova etapa!\n\n✅ *${etapaAtual}*\n\nAcesse seu portal WB para ver todos os detalhes do progresso.\n\n_WB Assessoria Migratória — (11) 91425-8886_`;
      const url = `https://wa.me/${fone}?text=${encodeURIComponent(msg)}`;
      if (confirm(`📱 Enviar notificação de avanço de etapa para ${c.nome} via WhatsApp?`)) {
        const a = document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }
    }
  } else {
    showToast('Processo já concluído!','info');
  }
}

// ── Helpers de moeda ────────────────────────────────────────────
function parseMoeda(v) {
  return parseFloat((v||'0').replace(/[R$\s.]/g,'').replace(',','.')) || 0;
}
function fmtMoeda(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function gerarSenhaPortal(nome) {
  const parte = (nome||'Cliente').trim().split(' ')[0].toLowerCase().replace(/[^a-z]/g,'').slice(0,6);
  const nums  = Math.floor(1000 + Math.random() * 9000);
  const esp   = ['!','@','#','$','*'][Math.floor(Math.random()*5)];
  return parte.charAt(0).toUpperCase() + parte.slice(1) + nums + esp;
}

function preencherCredenciaisPortal() {
  const email = document.getElementById('nc_email')?.value?.trim()||'';
  const nome  = document.getElementById('nc_nome')?.value?.trim()||'';
  const loginEl = document.getElementById('nc_portal_login');
  const senhaEl = document.getElementById('nc_portal_senha');
  if (loginEl && !loginEl.value && email) loginEl.value = email;
  if (senhaEl && !senhaEl.value && nome)  senhaEl.value = gerarSenhaPortal(nome);
  if (_ncWizard) { _ncWizard.nome = nome; _ncWizard.email = email; }
}

function wizardProximo(etapa) {
  const erro = document.getElementById('nc_erro');
  if (etapa===1) {
    const nome  = document.getElementById('nc_nome')?.value?.trim();
    const email = document.getElementById('nc_email')?.value?.trim();
    if (!nome)  { if(erro){erro.textContent='⚠️ Nome é obrigatório.';erro.style.display='block';} return; }
    if (!email) { if(erro){erro.textContent='⚠️ E-mail é obrigatório.';erro.style.display='block';} return; }
    const d = _ncWizard.docs||{};
    if (d.senhaGov && (d.senhaGovVal||'').length < 16) {
      if(erro){erro.textContent='⚠️ Senha do GOV.BR deve ter no mínimo 16 caracteres.';erro.style.display='block';} return;
    }
    _ncWizard.nome       = nome;
    _ncWizard.email      = email;
    _ncWizard.tel        = document.getElementById('nc_tel')?.value?.trim()||'';
    _ncWizard.cpf        = document.getElementById('nc_cpf')?.value?.trim()||'';
    _ncWizard.rnm        = document.getElementById('nc_rnm')?.value?.trim()||'';
    _ncWizard.pais       = document.getElementById('nc_pais')?.value?.trim()||'';
    _ncWizard.servico    = document.getElementById('nc_servico')?.value||'Naturalização Brasileira';
    _ncWizard.resp       = document.getElementById('nc_resp')?.value||'';
    _ncWizard.prioridade = document.getElementById('nc_prio')?.value||'normal';
    _ncWizard.obs        = document.getElementById('nc_obs')?.value?.trim()||'';
    // coleta docs extras
    _ncWizard.docs.rnm           = document.getElementById('doc_rnm')?.checked||false;
    _ncWizard.docs.cpfDoc        = document.getElementById('doc_cpf_d')?.checked||false;
    _ncWizard.docs.enderecoAtual = document.getElementById('doc_end')?.checked||false;
    _ncWizard.docs.certLingua    = document.getElementById('doc_certlp')?.checked||false;
    _ncWizard.docs.certProva     = document.getElementById('doc_certpp')?.checked||false;
    _ncWizard.docs.passaporte    = document.getElementById('doc_pass')?.checked||false;
    _ncWizard.docs.passaporteQtd = document.getElementById('doc_pass_qtd')?.value||'1';
    _ncWizard.docs.comp4anos     = document.getElementById('doc_4a')?.checked||false;
    _ncWizard.docs.comp4anosDesc = document.getElementById('doc_4a_desc')?.value||'';
    _ncWizard.docs.antecedente   = document.getElementById('doc_ant')?.checked||false;
    _ncWizard.docs.antecedenteTipo = document.getElementById('doc_ant_tipo')?.value||'Legalizado';
    _ncWizard.docs.antecedenteVal  = document.getElementById('doc_ant_val')?.value||'';
    _ncWizard.docs.senhaGov      = document.getElementById('doc_govsenha')?.checked||false;
    _ncWizard.docs.senhaGovVal   = document.getElementById('doc_gov_val')?.value||'';
    _ncWizard.docs.certNasc      = document.getElementById('doc_nasc')?.checked||false;
    _ncWizard.docs.certNascDesc  = document.getElementById('doc_nasc_desc')?.value||'';
    _ncWizard.docs.casamento     = document.getElementById('doc_cas')?.checked||false;
    _ncWizard.docs.casamentoTipo = document.getElementById('doc_cas_tipo')?.value||'Casamento';
    _ncWizard.docs.trabalho      = document.getElementById('doc_trab')?.checked||false;
  }
  if (etapa===2) {
    _ncWizard.valorTotal   = document.getElementById('nc_vt')?.value||'';
    _ncWizard.valorEntrada = document.getElementById('nc_ve')?.value||'';
    _ncWizard.parcelas     = parseInt(document.getElementById('nc_parc')?.value)||0;
    _ncWizard.valorParcela = document.getElementById('nc_vp')?.value||'';
    document.querySelectorAll('input[name="nc_pago_r"]').forEach(r=>{ if(r.checked) _ncWizard.pago=r.value; });
  }
  renderWizardEtapa(etapa+1);
}

function wizardVoltar(etapa) { renderWizardEtapa(etapa-1); }

function calcParcelas() {
  const total  = parseMoeda(document.getElementById('nc_vt')?.value||'0');
  const ent    = parseMoeda(document.getElementById('nc_ve')?.value||'0');
  const parc   = parseInt(document.getElementById('nc_parc')?.value)||0;
  const wrap   = document.getElementById('nc_vp_wrap');
  const resumo = document.getElementById('nc_resumo');
  const linhas = document.getElementById('nc_resumo_linhas');
  if (wrap) wrap.style.display = parc>0 ? 'flex' : 'none';
  if (parc>0 && total>0) {
    const vlr = (total-ent)/parc;
    const el  = document.getElementById('nc_vp');
    if (el) { el.value = fmtMoeda(vlr); _ncWizard.valorParcela = el.value; }
  }
  if (resumo && linhas && total>0) {
    resumo.style.display='block';
    let h=`<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0;border-bottom:1px solid var(--border2)"><span style="color:var(--text3)">Valor Total</span><span style="color:var(--gold);font-weight:700">${fmtMoeda(total)}</span></div>`;
    if (ent>0) h+=`<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0;border-bottom:1px solid var(--border2)"><span style="color:var(--text3)">Entrada</span><span style="color:var(--text)">${fmtMoeda(ent)}</span></div>`;
    if (parc>0) h+=`<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0"><span style="color:var(--text3)">Parcelas</span><span style="color:var(--text)">${parc}x de ${fmtMoeda((total-ent)/parc)}</span></div>`;
    else h+=`<div style="display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0"><span style="color:var(--text3)">Forma</span><span style="color:var(--text)">À vista</span></div>`;
    linhas.innerHTML=h;
  } else if (resumo) resumo.style.display='none';
}

function salvarNovoCliente() {
  if (!_ncWizard.nome||!_ncWizard.email) {
    const e=document.getElementById('nc_erro'); if(e){e.textContent='⚠️ Dados obrigatórios ausentes.';e.style.display='block';} return;
  }
  const portalLogin = document.getElementById('nc_portal_login')?.value?.trim() || _ncWizard.email;
  const portalSenha = document.getElementById('nc_portal_senha')?.value?.trim() || gerarSenhaPortal(_ncWizard.nome);
  const cursoLogin  = document.getElementById('nc_curso_login')?.value?.trim()  || '';
  const cursoSenha  = document.getElementById('nc_curso_senha')?.value?.trim()  || '';
  const cursoLink   = document.getElementById('nc_curso_link')?.value?.trim()   || configEmpresa.cursoLink||'';
  const serv        = _ncWizard.servico||'Naturalização Brasileira';
  const totalEtapas = serv.includes('Naturaliz')?6:serv.includes('RNM')?5:4;
  const hoje        = new Date().toLocaleDateString('pt-BR');
  const d           = _ncWizard.docs||{};

  // Monta lista de docs marcados
  const docsOk = [
    d.rnm          && 'RNM',
    d.cpfDoc       && 'CPF',
    d.enderecoAtual&& 'Comprovante de Endereço Atualizado',
    d.passaporte   && `Passaporte (${d.passaporteQtd||1}x)`,
    d.comp4anos    && `Comprovante 4 anos no país${d.comp4anosDesc?' — '+d.comp4anosDesc:''}`,
    d.antecedente  && `Antecedente Criminal (${d.antecedenteTipo||'Legalizado'})${d.antecedenteVal?' — val. '+new Date(d.antecedenteVal+'T12:00').toLocaleDateString('pt-BR'):''}`,
    d.certLingua   && 'Certificado de Língua Portuguesa',
    d.certProva    && 'Certificado de Prova Presencial',
    d.certNasc     && `Certidão de Nascimento (filhos)${d.certNascDesc?' — '+d.certNascDesc:''}`,
    d.casamento    && (d.casamentoTipo||'Certidão de Casamento'),
    d.trabalho     && `Carteira de Trabalho/CNPJ/MEI${(d.trabalhoTipos||[]).length?' ('+d.trabalhoTipos.join(', ')+')':''}`,
  ].filter(Boolean);

  const novo = {
    id:_clienteId++, nome:_ncWizard.nome, email:_ncWizard.email,
    tel:_ncWizard.tel||'—', cpf:_ncWizard.cpf||'—', rnm:_ncWizard.rnm||'—', pais:_ncWizard.pais||'—',
    servico:serv, status:'Pendente Documentação', etapa:0, totalEtapas,
    responsavel:_ncWizard.resp||(colaboradores[0]?.nome||''),
    prioridade:_ncWizard.prioridade||'normal', dataCadastro:hoje,
    valor:parseMoeda(_ncWizard.valorTotal||'0'),
    valorEntrada:parseMoeda(_ncWizard.valorEntrada||'0'),
    parcelas:_ncWizard.parcelas||0,
    valorParcela:parseMoeda(_ncWizard.valorParcela||'0'),
    pago:(_ncWizard.pago||'false')==='true',
    docs:docsOk, docsPendentes:[], docsDetalhes:{...d},
    obs:_ncWizard.obs||'',
    portalLogin, portalSenha, cursoLogin, cursoSenha, cursoLink,
    senhaGov:d.senhaGov?d.senhaGovVal:'',
  };

  clientes.push(novo);
  if (cursoLink&&!configEmpresa.cursoLink) configEmpresa.cursoLink=cursoLink;
  saveData(); closeModal(); _ncWizard={};
  navigateTo('clientes');
  setTimeout(()=>showToast(`✅ "${novo.nome}" cadastrado! ${docsOk.length} doc(s) marcado(s).`),100);
}

function salvarNovaTarefa() {
  const titulo = document.getElementById('nt_titulo').value.trim();
  const erro   = document.getElementById('nt_erro');
  if (!titulo) { erro.textContent='⚠️ Título é obrigatório.'; erro.style.display='block'; return; }
  const prazoRaw = document.getElementById('nt_prazo').value;
  const prazo = prazoRaw ? new Date(prazoRaw).toLocaleDateString('pt-BR') : '—';
  const nova = {
    id         : (tarefas.length ? Math.max(...tarefas.map(t=>t.id||0))+1 : 1),
    titulo,
    prioridade : document.getElementById('nt_prio').value,
    prazo,
    status     : 'pendente',
    cliente    : document.getElementById('nt_cliente').value,
    responsavel: document.getElementById('nt_resp').value,
  };
  tarefas.push(nova);
  saveData();
  closeModal();
  navigateTo('tarefas');
  setTimeout(() => showToast('✅ Tarefa criada com sucesso!'), 100);
}

function salvarNovoAgendamento() {
  const dataRaw = document.getElementById('na_data').value;
  const hora    = document.getElementById('na_hora').value;
  const erro    = document.getElementById('na_erro');
  if (!dataRaw) { erro.textContent='⚠️ Data é obrigatória.'; erro.style.display='block'; return; }
  if (!hora)    { erro.textContent='⚠️ Hora é obrigatória.'; erro.style.display='block'; return; }
  const data = new Date(dataRaw).toLocaleDateString('pt-BR');
  const novo = {
    id         : _agendId++,
    data, hora,
    cliente    : document.getElementById('na_cliente').value,
    tipo       : document.getElementById('na_tipo').value,
    colaborador: document.getElementById('na_resp').value,
    obs        : document.getElementById('na_obs').value.trim(),
  };
  agendamentos.push(novo);
  agendamentos.sort((a,b) => a.data.split('/').reverse().join('')+a.hora > b.data.split('/').reverse().join('')+b.hora ? 1 : -1);
  saveData();
  closeModal();
  navigateTo('agendamentos');
  setTimeout(() => showToast('✅ Agendamento criado com sucesso!'), 100);
}

function salvarNovoColaborador(isCeo) {
  const nome  = document.getElementById('ncol_nome').value.trim();
  const email = document.getElementById('ncol_email').value.trim();
  const cargo = document.getElementById('ncol_cargo').value.trim();
  const erro  = document.getElementById('ncol_erro');

  if (!nome)  { erro.textContent='⚠️ Nome é obrigatório.';  erro.style.display='block'; return; }
  if (!email) { erro.textContent='⚠️ E-mail é obrigatório.'; erro.style.display='block'; return; }
  if (!cargo) { erro.textContent='⚠️ Cargo é obrigatório.';  erro.style.display='block'; return; }
  const senhaEl = document.getElementById('ncol_senha');
  const senha = senhaEl ? senhaEl.value.trim() : '';
  if (!senha) { erro.textContent='⚠️ Senha é obrigatória.'; erro.style.display='block'; return; }
  if (colaboradores.find(c=>c.email.toLowerCase()===email.toLowerCase())) {
    erro.textContent='⚠️ Já existe um colaborador com este e-mail.'; erro.style.display='block'; return;
  }

  const acesso = isCeo ? 'ceo' : (document.getElementById('ncol_acesso').value || 'colaborador');
  const initials = nome.split(' ').filter(Boolean).map(w=>w[0].toUpperCase()).slice(0,2).join('');
  const hoje = new Date().toLocaleDateString('pt-BR');

  const novo = {
    id          : _colaborId++,
    nome        : nome,
    cargo       : cargo,
    email       : email,
    senha       : senha,
    tel         : document.getElementById('ncol_tel').value.trim() || '—',
    acesso      : acesso,
    av          : initials,
    processos   : 0,
    status      : 'ativo',
    dataCadastro: hoje,
    obs         : document.getElementById('ncol_obs').value.trim(),
  };

  colaboradores.push(novo);
  saveData();
  closeModal();
  navigateTo('colaboradores');
  setTimeout(() => showToast(`✅ ${acesso==='ceo'?'Diretor':'Colaborador'} "${nome}" cadastrado com sucesso!`), 100);
}

function atualizarColaborador(id) {
  const c = colaboradores.find(x=>x.id===id);
  if (!c) return;
  c.nome   = document.getElementById('ec_nome').value.trim() || c.nome;
  c.email  = document.getElementById('ec_email').value.trim() || c.email;
  c.tel    = document.getElementById('ec_tel').value.trim() || '—';
  c.cargo  = document.getElementById('ec_cargo').value.trim() || c.cargo;
  c.acesso = document.getElementById('ec_acesso').value;
  c.status = document.getElementById('ec_status').value;
  c.obs    = document.getElementById('ec_obs').value.trim();
  c.av     = c.nome.split(' ').filter(Boolean).map(w=>w[0].toUpperCase()).slice(0,2).join('');
  const novaSenha = document.getElementById('ec_senha').value.trim();
  if (novaSenha) c.senha = novaSenha;
  saveData();
  closeModal();
  navigateTo('colaboradores');
}

function excluirColaborador(id) {
  const c = colaboradores.find(x=>x.id===id);
  if (!c) return;
  if (!confirm(`Deseja realmente excluir o colaborador "${c.nome}"?`)) return;
  colaboradores = colaboradores.filter(x=>x.id!==id);
  saveData();
  closeModal();
  navigateTo('colaboradores');
}

function avançarTarefa(i) {
  const ordem = ['pendente','andamento','concluida'];
  const t = tarefas[i];
  const idx = ordem.indexOf(t.status);
  if (idx < ordem.length-1) { t.status = ordem[idx+1]; saveData(); renderPage('tarefas'); }
}

function gerarNotificacoes() {
  const notifs = [];
  const hoje   = new Date();
  hoje.setHours(0,0,0,0);

  // 1. Documentos pendentes
  clientes.forEach(c => {
    if (c.status === 'Cancelado') return;
    (c.docsPendentes||[]).forEach(doc => {
      notifs.push({ tipo:'doc', icon:'📄', titulo:`Doc pendente — ${c.nome.split(' ')[0]}`, sub:`Aguardando: ${doc}`, urgente: c.prioridade==='alta', cId: c.id });
    });
  });

  // 2. Pagamentos pendentes
  clientes.filter(c => !c.pago && c.status !== 'Cancelado').forEach(c => {
    notifs.push({ tipo:'pag', icon:'💸', titulo:`Pagamento pendente — ${c.nome.split(' ')[0]}`, sub:`R$ ${c.valor?.toLocaleString('pt-BR')} · ${c.servico}`, urgente:true, cId: c.id });
  });

  // 3. Agendamentos hoje ou amanhã
  agendamentos.forEach(ag => {
    const [dd,mm,aa] = (ag.data||'').split('/');
    if (!dd) return;
    const dt = new Date(+aa, +mm-1, +dd);
    dt.setHours(0,0,0,0);
    const diff = Math.round((dt-hoje)/864e5);
    if (diff === 0) notifs.push({ tipo:'ag', icon:'📅', titulo:`Agendamento hoje — ${ag.cliente?.split(' ')[0]||'Cliente'}`, sub:`${ag.hora} · ${ag.tipo}`, urgente:true });
    else if (diff === 1) notifs.push({ tipo:'ag', icon:'📅', titulo:`Agendamento amanhã — ${ag.cliente?.split(' ')[0]||'Cliente'}`, sub:`${ag.hora} · ${ag.tipo}`, urgente:false });
  });

  // 4. Tarefas vencidas
  tarefas.filter(t => t.status !== 'concluida').forEach(t => {
    const [dd,mm,aa] = (t.prazo||'').split('/');
    if (!dd) return;
    const dt = new Date(+aa, +mm-1, +dd);
    dt.setHours(0,0,0,0);
    if (dt < hoje) notifs.push({ tipo:'task', icon:'⚠️', titulo:`Tarefa vencida — ${t.titulo?.slice(0,30)}`, sub:`Prazo: ${t.prazo}`, urgente:true });
  });

  // 5. Guias ISS pendentes
  guiasISS.filter(g => g.status === 'Pendente').forEach(g => {
    const [dd,mm,aa] = (g.vencimento||'').split('/');
    if (!dd) return;
    const dt = new Date(+aa,+mm-1,+dd); dt.setHours(0,0,0,0);
    const diff = Math.round((dt-hoje)/864e5);
    if (diff <= 5) notifs.push({ tipo:'iss', icon:'🏦', titulo:`ISS a recolher — ${MESES_PT[g.mes-1]}/${g.ano}`, sub:`R$ ${g.valor?.toLocaleString('pt-BR',{minimumFractionDigits:2})} · Vence ${g.vencimento}`, urgente: diff<=2 });
  });

  // 6. NF pendentes de emissão
  const nfPend = notasFiscais.filter(n=>n.status==='Pendente').length;
  if (nfPend > 0) notifs.push({ tipo:'nf', icon:'🧾', titulo:`${nfPend} nota(s) fiscal(is) em rascunho`, sub:'Clique para ir ao módulo fiscal', urgente:false });

  // 7. Config incompleta
  if (!configEmpresa.im) notifs.push({ tipo:'cfg', icon:'⚙️', titulo:'Inscrição Municipal não configurada', sub:'Configure em Configurações → Empresa para NF-e completa', urgente:false });

  // Sem notificações
  if (!notifs.length) notifs.push({ tipo:'ok', icon:'✅', titulo:'Tudo em ordem!', sub:'Nenhum alerta no momento.', urgente:false });

  return notifs;
}

function toggleNotif() {
  const panel = document.getElementById('notif-panel');
  const isOpen = panel.classList.toggle('open');
  if (isOpen) atualizarNotificacoes();
}

function atualizarNotificacoes() {
  const lista  = document.getElementById('notif-lista');
  const dot    = document.getElementById('notif-dot');
  if (!lista) return;

  const notifs  = gerarNotificacoes();
  const urgentes = notifs.filter(n=>n.urgente).length;

  if (dot) dot.style.display = urgentes > 0 ? 'block' : 'none';

  lista.innerHTML = notifs.map(n=>`
    <div class="notif-item" style="cursor:${n.cId?'pointer':'default'}" onclick="${n.cId?`closeNotif();openClienteModal(${n.cId})`:(n.tipo==='cfg'?`closeNotif();navigateTo('configuracoes')`:(n.tipo==='nf'||n.tipo==='iss'?`closeNotif();navigateTo('fiscal')`:''))}">
      <div class="notif-item-title" style="color:${n.urgente?'var(--orange)':'var(--text)'}">
        ${n.icon} ${n.titulo}
      </div>
      <div class="notif-item-sub">${n.sub}</div>
    </div>`).join('');
}

function closeNotif() {
  document.getElementById('notif-panel')?.classList.remove('open');
}

function marcarTodasLidas() {
  const lista = document.getElementById('notif-lista');
  const dot   = document.getElementById('notif-dot');
  if (lista) lista.innerHTML = `<div class="notif-item"><div class="notif-item-title" style="color:var(--text3)">✅ Tudo certo — nenhum alerta</div></div>`;
  if (dot)   dot.style.display = 'none';
}

document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  if (panel && !panel.contains(e.target) && !e.target.closest('.notif-btn') && !e.target.closest('#notif-btn')) {
    panel.classList.remove('open');
  }
});

function calcUpdate() {
  const nac = document.getElementById('calc-nac')?.value;
  const obj = document.getElementById('calc-obj')?.value;
  const tempo = document.getElementById('calc-tempo')?.value;
  const vinculo = document.getElementById('calc-vinculo')?.value;
  const pass = document.getElementById('calc-pass')?.value;
  const criminal = document.getElementById('calc-criminal')?.value;
  const res = document.getElementById('calc-resultado');
  if (!res) return;
  if (!nac || !obj || !tempo || !vinculo || !pass || !criminal) { res.style.display='none'; return; }
  res.style.display='block';

  let recomendacoes = [];
  let alertas = [];

  if (obj === 'nat') {
    if (criminal === 'sim') { alertas.push('⚠️ Antecedentes criminais podem inviabilizar a naturalização (Art. 65, §1º, Lei nº 13.445/2017). Consulte um advogado.'); }
    if (tempo === 'mais15' && criminal === 'nao') {
      recomendacoes.push({ tipo:'✅ ALTAMENTE RECOMENDADO', serv:'Naturalização Extraordinária', desc:'Você preenche o requisito de +15 anos de residência ininterrupta sem condenação penal.', base:'Art. 67, Lei nº 13.445/2017', cor:'var(--green)' });
    } else if ((tempo === '4a15' || tempo === 'mais15') && (vinculo === 'conjugeBR' || vinculo === 'filhoBR')) {
      recomendacoes.push({ tipo:'✅ ELEGÍVEL', serv:'Naturalização Ordinária (prazo reduzido – 1 ano)', desc:'Por ter cônjuge ou filho brasileiro, o prazo de residência cai para 1 ano.', base:'Art. 65, §1º, I, Lei nº 13.445/2017', cor:'var(--gold)' });
    } else if (tempo === '4a15' || tempo === 'mais15') {
