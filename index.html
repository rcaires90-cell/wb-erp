// ⏰ PRAZOS & ALERTAS DE VENCIMENTO
// ══════════════════════════════════════
function renderPrazos() {
  const hoje = new Date();
  hoje.setHours(0,0,0,0);

  // Gera alertas automaticamente dos clientes reais
  const alertas = [];
  clientes.forEach(c => {
    // Docs pendentes
    (c.docsPendentes || []).forEach(doc => {
      alertas.push({ cliente:c.nome, tipo:'Documento Pendente', item:doc, prazo:null, dias:null, nivel:'alto', clienteId:c.id });
    });
    // Status pendente há mais de 30 dias
    if (c.status === 'Pendente Documentação') {
      alertas.push({ cliente:c.nome, tipo:'Processo Parado', item:'Processo aguardando documentação', prazo:null, dias:null, nivel:'medio', clienteId:c.id });
    }
    // Pagamento pendente
    if (!c.pago && c.valor > 0) {
      alertas.push({ cliente:c.nome, tipo:'Pagamento Pendente', item:`R$ ${(c.valor||0).toLocaleString('pt-BR')} em aberto`, prazo:null, dias:null, nivel:'alto', clienteId:c.id });
    }
  });

  // Parcelas vencidas ou próximas do vencimento
  parcelasData.forEach(contrato => {
    contrato.parcelas.forEach(p => {
      if (p.status === 'pago') return;
      const [d,m,a] = p.venc.split('/');
      const venc = new Date(a, m-1, d);
      const diff = Math.round((venc - hoje) / 86400000);
      const nivel = diff < 0 ? 'alto' : diff <= 7 ? 'alto' : diff <= 30 ? 'medio' : 'baixo';
      alertas.push({
        cliente: contrato.cliente,
        tipo: diff < 0 ? 'Parcela Vencida' : 'Parcela a Vencer',
        item: `Parcela ${p.num}/${contrato.parcelas.length} — R$ ${p.valor.toLocaleString('pt-BR')} · vence ${p.venc}`,
        prazo: p.venc,
        dias: diff,
        nivel,
      });
    });
  });

  const urgentes = alertas.filter(a=>a.nivel==='alto').length;
  const atencao  = alertas.filter(a=>a.nivel==='medio').length;
  const monitor  = alertas.filter(a=>a.nivel==='baixo').length;
  const corNivel   = { alto:'var(--red)', medio:'var(--orange)', baixo:'var(--gold)' };
  const bgNivel    = { alto:'rgba(239,68,68,0.08)', medio:'rgba(245,158,11,0.08)', baixo:'rgba(201,168,76,0.06)' };
  const labelNivel = { alto:'🔴 URGENTE', medio:'🟡 ATENÇÃO', baixo:'🟢 MONITORAR' };

  return `
    <div class="stat-grid" style="margin-bottom:28px">
      <div class="stat-card red"><div class="stat-icon">🚨</div><div class="stat-label">Urgentes</div><div class="stat-value">${urgentes}</div></div>
      <div class="stat-card gold"><div class="stat-icon">⚠️</div><div class="stat-label">Atenção</div><div class="stat-value">${atencao}</div></div>
      <div class="stat-card green"><div class="stat-icon">📅</div><div class="stat-label">Monitorar</div><div class="stat-value">${monitor}</div></div>
      <div class="stat-card blue"><div class="stat-icon">📋</div><div class="stat-label">Total de Alertas</div><div class="stat-value">${alertas.length}</div></div>
    </div>

    <div class="panel">
      <div class="panel-header"><span class="panel-title">Prazos & Alertas (${alertas.length})</span></div>
      <div class="panel-body" style="display:flex;flex-direction:column;gap:10px">
        ${alertas.length === 0
          ? `<div style="text-align:center;padding:40px;color:var(--text3)">
               <div style="font-size:2rem;margin-bottom:12px">✅</div>
               <div>Nenhum alerta no momento. Tudo em dia!</div>
             </div>`
          : alertas.sort((a,b)=>{
              const p = {alto:0,medio:1,baixo:2};
              return p[a.nivel]-p[b.nivel];
            }).map(a=>`
            <div style="background:${bgNivel[a.nivel]};border:1px solid ${corNivel[a.nivel]}33;border-left:4px solid ${corNivel[a.nivel]};border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
              <div style="flex-shrink:0;min-width:90px">
                <div style="font-size:0.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:${corNivel[a.nivel]}">${labelNivel[a.nivel]}</div>
                ${a.dias !== null ? `<div style="font-family:'DM Mono',monospace;font-size:1rem;font-weight:700;color:${corNivel[a.nivel]};margin-top:2px">${a.dias < 0 ? Math.abs(a.dias)+'d atr.' : a.dias+'d'}</div>` : ''}
              </div>
              <div style="flex:1">
                <div style="font-weight:600;color:var(--text);font-size:0.88rem">${a.cliente}</div>
                <div style="font-size:0.78rem;color:var(--text3);margin-top:2px"><span class="badge badge-gray">${a.tipo}</span></div>
                <div style="font-size:0.8rem;color:var(--text2);margin-top:6px">${a.item}</div>
              </div>
              ${a.prazo ? `<div style="text-align:right;flex-shrink:0">
                <div style="font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Vencimento</div>
                <div style="font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--text);margin-top:2px">${a.prazo}</div>
              </div>` : ''}
            </div>`).join('')}
      </div>
    </div>
  `;
}

function verModelo(nome, corpo, idPersonalizado) {
  const escapedCorpo = corpo.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const jsonCorpo = JSON.stringify(corpo).replace(/'/g,"&#39;");
  openModal(`
    <div class="modal-title" style="font-size:1rem">${nome}</div>
    <div style="background:var(--navy4);border:1px solid var(--border2);border-radius:10px;padding:16px;margin-bottom:16px;max-height:55vh;overflow-y:auto">
      <pre style="white-space:pre-wrap;font-family:'DM Mono',monospace;font-size:0.73rem;color:var(--text2);line-height:1.7;margin:0">${escapedCorpo}</pre>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="navigator.clipboard.writeText(${jsonCorpo}).then(()=>showToast('✅ Texto copiado! Cole no Word ou Google Docs.'))">📋 Copiar Texto</button>
      ${idPersonalizado ? `<button class="btn btn-outline" onclick="closeModal();setTimeout(()=>editarModeloPersonalizado(${idPersonalizado}),200)">✏️ Editar</button>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

        <input id="nm_desc" placeholder="Ex: Contrato padrão para clientes premium">
      </div>
      <div class="form-field form-full">
        <label>Tags <span style="font-size:0.72rem;color:var(--text3)">(separadas por vírgula)</span></label>
        <input id="nm_tags" placeholder="Ex: WB Exclusivo, Assinatura, Premium">
      </div>
      <div class="form-field form-full">
        <label>Texto do Modelo <span style="color:var(--red)">*</span></label>
        <textarea id="nm_corpo" placeholder="Cole ou escreva aqui o texto completo do contrato/documento..." style="min-height:260px;font-family:'DM Mono',monospace;font-size:0.78rem;line-height:1.6;resize:vertical"></textarea>
      </div>
    </div>
    <div id="nm_erro" style="color:var(--red);font-size:0.8rem;margin-top:8px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="salvarNovoModelo()">💾 Salvar Modelo</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function salvarNovoModelo() {
  const nome  = document.getElementById('nm_nome').value.trim();
  const corpo = document.getElementById('nm_corpo').value.trim();
  const erro  = document.getElementById('nm_erro');
  if (!nome)  { erro.textContent='⚠️ Nome é obrigatório.';         erro.style.display='block'; return; }
  if (!corpo) { erro.textContent='⚠️ O texto do modelo é obrigatório.'; erro.style.display='block'; return; }

  const tags = document.getElementById('nm_tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  modelosPersonalizados.push({
    id   : _modeloId++,
    cat  : document.getElementById('nm_cat').value.trim() || 'Meus Contratos',
    nome,
    desc : document.getElementById('nm_desc').value.trim(),
    tags,
    corpo,
    criado: new Date().toLocaleDateString('pt-BR'),
  });
  saveData();
  closeModal();
  navigateTo('modelos');
  showToast('✅ Modelo salvo com sucesso!');
}

function editarModeloPersonalizado(id) {
  const m = modelosPersonalizados.find(x=>x.id===id);
  if (!m) return;
  openModal(`
    <div class="modal-title">✏️ Editar Modelo</div>
    <div class="form-grid">
      <div class="form-field form-full">
        <label>Nome do Modelo <span style="color:var(--red)">*</span></label>
        <input id="em_nome" value="${m.nome.replace(/"/g,'&quot;')}">
      </div>
      <div class="form-field">
        <label>Categoria</label>
        <input id="em_cat" value="${m.cat}" list="em_cat_list">
        <datalist id="em_cat_list">
          <option value="Meus Contratos">
          <option value="Declarações">
          <option value="Cartas & Ofícios">
          <option value="Termos Internos">
          <option value="Outros">
        </datalist>
      </div>
      <div class="form-field">
        <label>Descrição</label>
        <input id="em_desc" value="${(m.desc||'').replace(/"/g,'&quot;')}">
      </div>
      <div class="form-field form-full">
        <label>Tags <span style="font-size:0.72rem;color:var(--text3)">(separadas por vírgula)</span></label>
        <input id="em_tags" value="${(m.tags||[]).join(', ')}">
      </div>
      <div class="form-field form-full">
        <label>Texto do Modelo <span style="color:var(--red)">*</span></label>
        <textarea id="em_corpo" style="min-height:260px;font-family:'DM Mono',monospace;font-size:0.78rem;line-height:1.6;resize:vertical">${m.corpo.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="salvarEdicaoModelo(${id})">💾 Salvar</button>
      <button class="btn btn-danger" onclick="excluirModelo(${id})" style="margin-right:auto">🗑️ Excluir</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function salvarEdicaoModelo(id) {
  const m = modelosPersonalizados.find(x=>x.id===id);
  if (!m) return;
  const nome  = document.getElementById('em_nome').value.trim();
  const corpo = document.getElementById('em_corpo').value.trim();
  if (!nome || !corpo) { showToast('⚠️ Nome e texto são obrigatórios.','error'); return; }
  m.nome  = nome;
  m.cat   = document.getElementById('em_cat').value.trim() || m.cat;
  m.desc  = document.getElementById('em_desc').value.trim();
  m.tags  = document.getElementById('em_tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  m.corpo = corpo;
  saveData();
  closeModal();
  navigateTo('modelos');
  showToast('✅ Modelo atualizado!');
}

function excluirModelo(id) {
  const m = modelosPersonalizados.find(x=>x.id===id);
  if (!confirm(`Excluir o modelo "${m?.nome}"?`)) return;
  modelosPersonalizados = modelosPersonalizados.filter(x=>x.id!==id);
  saveData();
  closeModal();
  navigateTo('modelos');
  showToast('🗑️ Modelo excluído.', 'info');
}

        { q:'Nacionais do Mercosul têm tratamento diferenciado?', a:'Sim. O Acordo de Residência do Mercosul (Dec. nº 6.975/2009) permite residência temporária simplificada por 2 anos, com apenas comprovação de nacionalidade e antecedentes criminais.' },

  const totalPendente = todasParcelas.filter(p=>p.status==='pendente').reduce((a,p)=>a+p.valor,0);
  const totalAtrasado = todasParcelas.filter(p=>p.status==='atrasado').reduce((a,p)=>a+p.valor,0);

          <option value="atrasado">Atrasados</option>

        ${tabelaParcelasHTML(todasParcelas)}

  `;
}

function tabelaParcelasHTML(lista) {
  const stColor = { pago:'badge-green', pendente:'badge-gold', atrasado:'badge-red' };
  const stLabel = { pago:'✓ Pago', pendente:'⏳ Pendente', atrasado:'🚨 Atrasado' };
  if (!lista.length) return `<div style="text-align:center;padding:30px;color:var(--text3)">Nenhuma parcela encontrada.</div>`;
  return `<table class="tbl">
    <thead><tr><th>Cliente</th><th>Serviço</th><th>Parcela</th><th>Valor</th><th>Vencimento</th><th>Status</th><th>Pgto</th><th>Ações</th></tr></thead>
    <tbody>
      ${lista.map((p,i)=>`
        <tr>
          <td style="font-weight:500;color:var(--text)">${p.cliente.split(' ').slice(0,2).join(' ')}</td>
          <td style="font-size:0.75rem">${servicoBadge(p.servico)}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text3)">Parc. ${p.num}</td>
          <td style="font-family:'DM Mono',monospace;color:var(--gold);font-size:0.82rem">R$ ${p.valor.toLocaleString('pt-BR')}</td>
          <td style="font-family:'DM Mono',monospace;font-size:0.78rem;color:${p.status==='atrasado'?'#f87171':'var(--text2)'}">${p.venc}</td>
          <td><span class="badge ${stColor[p.status]}">${stLabel[p.status]}</span></td>
          <td style="font-size:0.75rem;color:var(--text3)">${p.dtPgto||'—'}</td>
          <td style="display:flex;gap:5px">
            ${p.status!=='pago'?`<button class="btn btn-sm btn-gold" onclick="marcarPago('${p.cliente}',${p.num})">✓</button>`:''}
            ${p.status==='atrasado'?`<button class="btn btn-sm btn-danger" onclick="openCobrancaModal('${p.cliente}',${p.valor})">📧</button>`:''}
          </td>
        </tr>`).join('')}
    </tbody>
  </table>`;
}

function filtrarParcelasStatus(st) {
  const todasParcelas = parcelasData.flatMap(c => c.parcelas.map(p => ({...p, cliente: c.cliente, servico: c.servico})));
  const lista = st ? todasParcelas.filter(p=>p.status===st) : todasParcelas;
  const el = document.getElementById('tabela-parcelas-body');
  if (el) el.innerHTML = tabelaParcelasHTML(lista);
}

function marcarPago(clienteNome, numParcela) {
  const contrato = parcelasData.find(c=>c.cliente===clienteNome);
  if (contrato) {
    const parc = contrato.parcelas.find(p=>p.num===numParcela);
    if (parc) {
      parc.status = 'pago';
      parc.dtPgto = new Date().toLocaleDateString('pt-BR');
      saveData();
      navigateTo('financeiro-avancado');
      showToast('✅ Parcela marcada como paga!');
    }
  }
}

function salvarNovoContratoParcelas() {
  const cliente = document.getElementById('ncp_cliente').value.trim();
  const valorRaw = document.getElementById('ncp_valor').value.replace(/\./g,'').replace(',','.');
  const valor    = parseFloat(valorRaw) || 0;
  const erro     = document.getElementById('ncp_erro');
  if (!cliente) { erro.textContent='⚠️ Cliente é obrigatório.'; erro.style.display='block'; return; }
  if (!valor)   { erro.textContent='⚠️ Valor é obrigatório.';  erro.style.display='block'; return; }

  const nParcelas = parseInt(document.getElementById('ncp_nparcelas').value);
  const servico   = document.getElementById('ncp_servico').value;
  const venc1Raw  = document.getElementById('ncp_venc1').value;
  const venc1     = venc1Raw ? new Date(venc1Raw) : new Date();
  const valParcela = Math.round(valor / nParcelas * 100) / 100;

  const parcelas = [];
  for (let i = 0; i < nParcelas; i++) {
    const vDate = new Date(venc1);
    vDate.setMonth(vDate.getMonth() + i);
    parcelas.push({
      num: i+1,
      valor: i < nParcelas-1 ? valParcela : Math.round((valor - valParcela*(nParcelas-1))*100)/100,
      venc: vDate.toLocaleDateString('pt-BR'),
      status: 'pendente',
      dtPgto: null,
    });
  }

  parcelasData.push({ id: _parcelasId++, cliente, servico, valorTotal: valor, parcelas });
  saveData();
  closeModal();
  navigateTo('financeiro-avancado');
  showToast(`✅ Contrato de ${nParcelas}x para "${cliente.split(' ')[0]}" criado!`);
}

              <div class="user-avatar" style="width:38px;height:38px;font-size:0.8rem;flex-shrink:0">${c.nome.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>
              <div>
                <div style="font-weight:600;color:var(--text)">${c.nome}</div>

          <div id="dossie-body-${c.id}" style="display:none">

              <!-- Upload area -->
              <div style="border:2px dashed var(--border2);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;transition:border-color 0.2s;cursor:pointer"
                ondragover="event.preventDefault();this.style.borderColor='var(--gold)'"

function renderArquivos(clienteId) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return '';
  const docs = c.arquivos || [];
  if (!docs.length) return `<div style="text-align:center;padding:20px;color:var(--text3);font-size:0.82rem">Nenhum arquivo enviado ainda.</div>`;

  const catIcons = { 'Contrato':'📜', 'Termo de Adaptação de Nome':'✍️', 'Check-List':'☑️', 'Termo de Imagem e Voz':'🎙️', 'Recibo':'🧾', 'Passaporte':'🛂', 'CPF':'🪪', 'Certidão':'📋', 'Procuração':'⚖️', 'Outro':'📄' };
  return `
    <div style="display:flex;flex-direction:column;gap:8px">
      ${docs.map(d=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--navy3);border-radius:10px;border:1px solid var(--border2)">
          <span style="font-size:1.3rem">${catIcons[d.cat]||'📄'}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:0.83rem;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.nome}</div>
            <div style="font-size:0.7rem;color:var(--text3)">${d.cat} · ${d.data} · ${(d.tamanho/1024).toFixed(0)} KB</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-sm btn-outline" onclick="baixarArquivo(${clienteId},${d.id})" title="Baixar">⬇️</button>
            <button class="btn btn-sm btn-danger" onclick="excluirArquivo(${clienteId},${d.id})" title="Excluir">🗑️</button>
          </div>
        </div>`).join('')}
    </div>`;
}

function toggleDossie(id) {
  const el = document.getElementById(`dossie-body-${id}`);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function filtrarDossie(q) {
  document.querySelectorAll('.dossie-card').forEach(card => {
    card.style.display = card.dataset.nome.includes(q.toLowerCase()) ? '' : 'none';
  });
}

function handleDrop(event, clienteId) {
  event.preventDefault();
  event.target.closest('[ondrop]').style.borderColor = 'var(--border2)';
  uploadArquivos(clienteId, event.dataTransfer.files);
}

function uploadArquivos(clienteId, fileList) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  if (!c.arquivos) c.arquivos = [];

  let pendentes = fileList.length;
  let erros = 0;

  Array.from(fileList).forEach(file => {
    if (file.size > 2.1 * 1024 * 1024) {
      showToast(`❌ "${file.name}" excede 2MB.`, 'error');
      pendentes--; return;
    }

    // Detectar categoria pelo nome
    const nLower = file.name.toLowerCase();
    let cat = 'Outro';
    if (nLower.includes('contrato'))         cat = 'Contrato';
    else if (nLower.includes('adaptacao') || nLower.includes('adaptação') || nLower.includes('nome')) cat = 'Termo de Adaptação de Nome';
    else if (nLower.includes('checklist') || nLower.includes('check')) cat = 'Check-List';
    else if (nLower.includes('imagem') || nLower.includes('voz')) cat = 'Termo de Imagem e Voz';
    else if (nLower.includes('recibo'))      cat = 'Recibo';
    else if (nLower.includes('passaporte'))  cat = 'Passaporte';
    else if (nLower.includes('cpf'))         cat = 'CPF';
    else if (nLower.includes('certid'))      cat = 'Certidão';
    else if (nLower.includes('procuracao') || nLower.includes('procuração')) cat = 'Procuração';

    const reader = new FileReader();
    reader.onload = e => {
      c.arquivos.push({
        id      : Date.now() + Math.random(),
        nome    : file.name,
        cat,
        tipo    : file.type,
        tamanho : file.size,
        data    : new Date().toLocaleDateString('pt-BR'),
        base64  : e.target.result,
      });
      pendentes--;
      if (pendentes === 0) {
        saveData();
        // Re-render lista do cliente específico
        const el = document.getElementById(`arquivos-${clienteId}`);
        if (el) el.innerHTML = renderArquivos(clienteId);
        // Atualiza contagem no header
        const panel = document.querySelector(`.dossie-card[data-nome="${c.nome.toLowerCase()}"] .panel-header div div:nth-child(2)`);
        if (panel) panel.textContent = `${c.servico} · ${c.arquivos.length} arquivo${c.arquivos.length!==1?'s':''}`;
        showToast(`✅ ${fileList.length - erros} arquivo(s) enviado(s) com sucesso!`);
      }
    };
    reader.onerror = () => { erros++; pendentes--; };
    reader.readAsDataURL(file);
  });
}

function baixarArquivo(clienteId, arquivoId) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c || !c.arquivos) return;
  const arq = c.arquivos.find(a=>a.id===arquivoId);
  if (!arq) return;
  const link = document.createElement('a');
  link.href = arq.base64;
  link.download = arq.nome;
  link.click();
}

function excluirArquivo(clienteId, arquivoId) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c || !c.arquivos) return;
  const arq = c.arquivos.find(a=>a.id===arquivoId);
  if (!confirm(`Excluir "${arq?.nome}"?`)) return;
  c.arquivos = c.arquivos.filter(a=>a.id!==arquivoId);
  saveData();
  const el = document.getElementById(`arquivos-${clienteId}`);
  if (el) el.innerHTML = renderArquivos(clienteId);
  showToast('🗑️ Arquivo excluído.', 'info');
}

function valorExtenso(n) {
  const un = ['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const dz = ['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const ct = ['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  if (n===0) return 'zero reais';
  let v = Math.round(n);
  let txt = '';
  if (v>=1000) { txt += (un[Math.floor(v/1000)]||dz[Math.floor(v/1000/10)])+' mil'; v = v%1000; if(v) txt+=' e '; }
  if (v>=100) { txt += v===100?'cem':ct[Math.floor(v/100)]; v=v%100; if(v) txt+=' e '; }
  if (v>=20) { txt += dz[Math.floor(v/10)]; v=v%10; if(v) txt+=' e '; }
  if (v>0) txt += un[v];
  return txt.trim() + ' reais';
}

function gerarContrato() {
  const cId  = parseInt(document.getElementById('gc_cliente')?.value);
  const mId  = document.getElementById('gc_modelo')?.value;
  if (!cId || !mId) { showToast('⚠️ Selecione cliente e modelo.','warn'); return; }

  const c = clientes.find(x=>x.id===cId);
  if (!c) return;

  let template = '';
  if (mId.startsWith('custom_')) {
    const customId = parseInt(mId.replace('custom_',''));
    const m = modelosPersonalizados.find(x=>x.id===customId);
    template = m?.corpo || '';
  } else {
    template = GERADOR_TEMPLATES[mId] || '';
  }

  if (!template) { showToast('⚠️ Modelo não encontrado.','error'); return; }

  const hoje = new Date();
  const dataFormatada = hoje.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const local = (configEmpresa?.endereco?.split(',').pop()?.trim()) || 'São Paulo, SP';

  const contrato = template
    .replace(/\{\{NOME\}\}/g, c.nome)
    .replace(/\{\{CPF\}\}/g, c.cpf || '___________________')
    .replace(/\{\{TEL\}\}/g, c.tel || '___________________')
    .replace(/\{\{EMAIL\}\}/g, c.email || '___________________')
    .replace(/\{\{PAIS\}\}/g, c.pais || '___________________')
    .replace(/\{\{SERVICO\}\}/g, c.servico)
    .replace(/\{\{VALOR\}\}/g, c.valor.toLocaleString('pt-BR',{minimumFractionDigits:2}))
    .replace(/\{\{VALOR_EXTENSO\}\}/g, valorExtenso(c.valor))
    .replace(/\{\{DATA\}\}/g, dataFormatada)
    .replace(/\{\{LOCAL\}\}/g, local)
    .replace(/\{\{RESPONSAVEL\}\}/g, c.responsavel || 'Renato Caires');

  const out  = document.getElementById('gc_output');
  const txt  = document.getElementById('gc_texto');
  const btn  = document.getElementById('gc_copy_btn');
  const salvarBtn = document.getElementById('gc_salvar_btn');
  if (!out || !txt) return;

  txt.textContent = contrato;
  out.style.display = 'block';

  btn.onclick = () => {
    const texto = txt.innerText || txt.textContent;
    navigator.clipboard.writeText(texto).then(()=>showToast('✅ Contrato copiado! Cole no Word.'));
  };

  salvarBtn.onclick = () => {
    const texto = txt.innerText || txt.textContent;
    const nomeDoc = `Contrato – ${c.nome.split(' ').slice(0,2).join(' ')} – ${new Date().toLocaleDateString('pt-BR')}`;
    // Salva como documento editado na lista de documentos salvos
    if (!documentosSalvos) window.documentosSalvos = [];
    window.documentosSalvos.push({ id: Date.now(), nome: nomeDoc, texto, clienteId: c.id, data: new Date().toLocaleDateString('pt-BR') });
    showToast(`💾 Contrato salvo como "${nomeDoc}"!`);
  };

  out.scrollIntoView({ behavior:'smooth' });
}

function preencherDadosTomador() {
  const sel  = document.getElementById('nf_cliente')?.value;
  const ext  = document.getElementById('nf_externo_area');
  const cpfI = document.getElementById('nf_tomador_cpf');
  if (sel === 'externo') {
    if (ext) ext.style.display = '';
    if (cpfI) cpfI.value = '';
    return;
  }
  if (ext) ext.style.display = 'none';
  const c = clientes.find(x=>x.id===parseInt(sel));
  if (c && cpfI) cpfI.value = c.cpf||'';
  // Auto-preenche valor se disponível
  const valI = document.getElementById('nf_valor');
  if (c && valI && !valI.value) { valI.value = c.valor||''; calcularISSNF(); }
  // Auto-preenche serviço
  const svcT = document.getElementById('nf_servico');
  if (c && svcT && !svcT.value) svcT.value = `Assessoria e consultoria em processos migratórios — ${c.servico}`;
}

function selecionarServicoNF(v) {
  const t = document.getElementById('nf_servico');
  if (!t) return;
  if (v && v !== '__custom__') t.value = v;
}

function calcularISSNF() {
  const val  = parseFloat(document.getElementById('nf_valor')?.value||0);
  const ali  = parseFloat(document.getElementById('nf_aliquota')?.value||2);
  const out  = document.getElementById('nf_iss_valor');
  if (out) out.value = 'R$ ' + (val * ali / 100).toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function salvarNF(status) {
  const cId  = document.getElementById('nf_cliente')?.value;
  const erro = document.getElementById('nf_erro');
  const servico = document.getElementById('nf_servico')?.value?.trim();
  const valorS  = parseFloat(document.getElementById('nf_valor')?.value||0);
  const aliquota= parseFloat(document.getElementById('nf_aliquota')?.value||2);

  let tomadorNome = '', tomadorCpf = '';
  if (cId === 'externo') {
    tomadorNome = document.getElementById('nf_ext_nome')?.value?.trim();
    if (!tomadorNome) { if(erro){erro.textContent='⚠️ Nome do tomador é obrigatório.';erro.style.display='block';} return; }
  } else if (cId) {
    const c = clientes.find(x=>x.id===parseInt(cId));
    tomadorNome = c?.nome||''; tomadorCpf = c?.cpf||'';
  } else {
    if(erro){erro.textContent='⚠️ Selecione o tomador de serviço.';erro.style.display='block';} return;
  }
  if (!servico) { if(erro){erro.textContent='⚠️ Descrição do serviço é obrigatória.';erro.style.display='block';} return; }
  if (!valorS || valorS<=0) { if(erro){erro.textContent='⚠️ Valor inválido.';erro.style.display='block';} return; }

  const iss   = Math.round(valorS * aliquota) / 100;
  const hoje  = new Date().toLocaleDateString('pt-BR');
  const [cm,ca] = (document.getElementById('nf_competencia')?.value||hoje).split('/');

  notasFiscais.push({
    id           : _nfId,
    numero       : _nfId,
    clienteId    : parseInt(cId)||null,
    clienteNome  : tomadorNome,
    clienteCpf   : document.getElementById('nf_tomador_cpf')?.value || tomadorCpf,
    servico,
    valor        : valorS,
    aliquota,
    iss          : parseFloat(iss.toFixed(2)),
    status,
    emissao      : document.getElementById('nf_emissao')?.value || hoje,
    competencia  : `${cm?.padStart(2,'0')||'01'}/${ca||new Date().getFullYear()}`,
    obs          : document.getElementById('nf_obs')?.value?.trim()||'',
  });
  _nfId++;
  saveData();
  closeModal();
  navigateTo('fiscal');
  showToast(status==='Emitida' ? '✅ Nota Fiscal emitida com sucesso!' : '💾 Nota salva como rascunho.');
}

function emitirNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  if (!confirm(`Emitir a NF-e nº ${String(n.numero).padStart(6,'0')} para ${n.clienteNome}?`)) return;
  n.status = 'Emitida';
  saveData();
  navigateTo('fiscal');
  showToast('✅ Nota Fiscal emitida!');
}

function cancelarNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  if (!confirm(`Cancelar a NF-e nº ${String(n.numero).padStart(6,'0')}?`)) return;
  n.status = 'Cancelada';
  saveData();
  navigateTo('fiscal');
  showToast('❌ Nota Fiscal cancelada.','info');
}

function visualizarNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  const html = gerarHTMLNF(n);
  openModal(`
    <div class="modal-title">🧾 NF-e Nº ${String(n.numero).padStart(6,'0')}</div>
    <div style="background:#fff;border-radius:10px;padding:4px;max-height:65vh;overflow-y:auto">
      <iframe id="nf-preview" style="width:100%;height:480px;border:none;border-radius:8px"></iframe>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="imprimirNF(${n.id})">🖨️ Imprimir / Salvar PDF</button>
      <button class="btn btn-outline" onclick="closeModal()">Fechar</button>
    </div>
  `);
  setTimeout(()=>{
    const iframe = document.getElementById('nf-preview');
    if (!iframe) return;

function imprimirNF(id) {
  const n = notasFiscais.find(x=>x.id===id);
  if (!n) return;
  const win = window.open('','_blank');
  win.document.write(gerarHTMLNF(n));
  win.document.close();

function openGerarGuiaISS() {

  // Calcula total de serviços do mês atual
  const nfMes = notasFiscais.filter(n=>{
    if (n.status==='Cancelada') return false;
    const [,m,a] = (n.competencia||'').split('/');
    return parseInt(m)===mesAtual && parseInt(a)===anoAtual;
  });
  const totalServicos = nfMes.reduce((a,b)=>a+(b.valor||0),0);
  const totalISS      = nfMes.reduce((a,b)=>a+(b.iss||0),0);
  // Vencimento: dia 10 do mês seguinte
  const vencDt = new Date(anoAtual, mesAtual, 10);
  const venc   = vencDt.toLocaleDateString('pt-BR');

  openModal(`
    <div class="modal-title">🏦 Gerar Guia de ISS</div>
    <div style="background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:0.82rem">

        <div><div style="font-size:0.7rem;color:var(--text3)">Total serviços</div><div style="font-weight:700;color:var(--gold)">R$ ${totalServicos.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>
        <div><div style="font-size:0.7rem;color:var(--text3)">ISS ${configEmpresa.iss||2}%</div><div style="font-weight:700;color:var(--green)">R$ ${totalISS.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div></div>

      </div>
      <div class="form-field">
        <label>Vencimento</label>
        <input id="guia_venc" value="${venc}" data-mask="data">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="salvarGuiaISS()">💾 Gerar Guia</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function calcGuia() {
  const s = parseFloat(document.getElementById('guia_servicos')?.value||0);
  const a = parseFloat(document.getElementById('guia_aliquota')?.value||2);
  const o = document.getElementById('guia_iss');
  if (o) o.value = (s*a/100).toFixed(2);
}

function salvarGuiaISS() {
  const mes  = parseInt(document.getElementById('guia_mes')?.value);
  const ano  = parseInt(document.getElementById('guia_ano')?.value);
  const svc  = parseFloat(document.getElementById('guia_servicos')?.value||0);
  const ali  = parseFloat(document.getElementById('guia_aliquota')?.value||2);
  const iss  = parseFloat(document.getElementById('guia_iss')?.value||0);
  const venc = document.getElementById('guia_venc')?.value;

  guiasISS.push({ id:_guiaId++, mes, ano, valorServicos:svc, aliquota:ali, valor:iss, vencimento:venc, status:'Pendente', emitido:new Date().toLocaleDateString('pt-BR') });
  saveData();
  closeModal();
  navigateTo('fiscal');
  showToast('🏦 Guia de ISS gerada! Acesse a aba Guias ISS.');
}

function calcularScore(c) {
  let score = 100;
  // Docs pendentes
  score -= (c.docsPendentes?.length || 0) * 8;
  // Status
  if (c.status === 'Pendente Documentação') score -= 20;
  if (c.status === 'Cancelado')             score -= 50;
  if (c.status === 'Concluído')             score = 100;
  // Pagamento
  if (!c.pago) score -= 15;
  // Progresso baixo
  const pct = c.etapa / (c.totalEtapas || 1);
  if (pct < 0.25) score -= 10;
  // Arquivos carregados
  const nArq = (c.arquivos||[]).length;
  if (nArq === 0) score -= 10;
  return Math.max(0, Math.min(100, score));
}

function renderRadar() {

  function card(c) {
    const score = calcularScore(c);
    const cor   = score >= 70 ? 'var(--green)' : score >= 40 ? 'var(--orange)' : 'var(--red)';

    const alertas = [];

function registrarEvento(clienteId, etapaIdx) {
  openModal(`

    </div>
  `);
}

function salvarEvento(clienteId, etapaIdx) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  if (!c.timeline) c.timeline = [];
  const obs = document.getElementById('evt_obs').value.trim();
  if (!obs) return;
  c.timeline[etapaIdx] = { data: new Date().toLocaleDateString('pt-BR'), obs };
  saveData();
  closeModal();
  navigateTo('linha-do-tempo');
  showToast('✅ Nota registrada na linha do tempo!');
}

function execCmd(cmd, val) {
  const editor = document.getElementById('doc-editor');
  if (!editor) return;
  editor.focus();
  document.execCommand(cmd, false, val || null);
}

function renderDocsList() {
  if (!_docsSalvos.length) return `<div style="padding:16px;font-size:0.78rem;color:var(--text3);text-align:center">Nenhum documento salvo.</div>`;
  return _docsSalvos.map(d=>`
    <div style="padding:10px 12px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.03)'" onmouseout="this.style.background=''" onclick="abrirDocSalvo(${d.id})">
      <div style="font-size:0.8rem;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.nome}</div>
      <div style="font-size:0.68rem;color:var(--text3);margin-top:2px">${d.data}${d.clienteNome?' · '+d.clienteNome.split(' ')[0]:''}</div>
      <button class="btn btn-danger btn-sm" style="margin-top:6px;width:100%;padding:3px" onclick="event.stopPropagation();excluirDocSalvo(${d.id})">🗑️ Excluir</button>
    </div>`).join('');
}

function novoDocumento() {
  const titulo = document.getElementById('doc-titulo');
  const editor = document.getElementById('doc-editor');
  const cliente = document.getElementById('doc-cliente');
  if (titulo) titulo.value = '';
  if (cliente) cliente.value = '';
  if (editor) editor.innerHTML = '<p style="color:#999;font-style:italic">Comece a digitar seu documento aqui...</p>';
  window._docAtualId = null;
}

function salvarDocumento() {
  const editor = document.getElementById('doc-editor');
  const titulo = document.getElementById('doc-titulo')?.value.trim();
  const clienteId = parseInt(document.getElementById('doc-cliente')?.value)||null;
  if (!editor) return;
  if (!titulo) { showToast('⚠️ Dê um nome ao documento antes de salvar.','warn'); document.getElementById('doc-titulo')?.focus(); return; }

  const html   = editor.innerHTML;
  const texto  = editor.innerText || editor.textContent;
  const data   = new Date().toLocaleDateString('pt-BR');
  const clienteNome = clienteId ? (clientes.find(c=>c.id===clienteId)?.nome||'') : '';

  if (window._docAtualId) {
    const doc = _docsSalvos.find(d=>d.id===window._docAtualId);
    if (doc) { doc.nome=titulo; doc.html=html; doc.texto=texto; doc.data=data; doc.clienteId=clienteId; doc.clienteNome=clienteNome; }
  } else {
    window._docAtualId = _docId;
    _docsSalvos.unshift({ id:_docId++, nome:titulo, html, texto, data, clienteId, clienteNome });
  }

  // Persiste nos dados globais
  try { localStorage.setItem('wb_erp_docs', JSON.stringify(_docsSalvos)); } catch(e) {}
  showToast(`💾 "${titulo}" salvo com sucesso!`);
  const lista = document.getElementById('docs-lista');
  if (lista) lista.innerHTML = renderDocsList();
}

function abrirDocSalvo(id) {
  const doc = _docsSalvos.find(d=>d.id===id);
  if (!doc) return;
  const editor = document.getElementById('doc-editor');
  const titulo = document.getElementById('doc-titulo');
  const cliente = document.getElementById('doc-cliente');
  if (editor) editor.innerHTML = doc.html || (doc.texto||'').replace(/\n/g,'<br>');
  if (titulo) titulo.value = doc.nome;
  if (cliente && doc.clienteId) cliente.value = doc.clienteId;
  window._docAtualId = id;
  showToast(`📂 "${doc.nome}" carregado.`,'info');
}

function excluirDocSalvo(id) {
  const doc = _docsSalvos.find(d=>d.id===id);
  if (!confirm(`Excluir "${doc?.nome}"?`)) return;
  _docsSalvos = _docsSalvos.filter(d=>d.id!==id);
  try { localStorage.setItem('wb_erp_docs', JSON.stringify(_docsSalvos)); } catch(e) {}
  if (window._docAtualId === id) { window._docAtualId = null; novoDocumento(); }
  const lista = document.getElementById('docs-lista');
  if (lista) lista.innerHTML = renderDocsList();
  showToast('🗑️ Documento excluído.','info');
}

function imprimirDocumento() {
  const editor = document.getElementById('doc-editor');
  const titulo = document.getElementById('doc-titulo')?.value || 'Documento WB';
  if (!editor) return;
  const html = editor.innerHTML;
  const win = window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head>
    <title>${titulo}</title>
    <style>
      * { box-sizing: border-box; }
      body { font-family: 'Times New Roman', serif; font-size: 12px; line-height: 1.8; padding: 50px 60px; color: #111; max-width: 800px; margin: 0 auto; }
      @page { margin: 2cm; }
      @media print { body { padding: 0; } }
    </style>
  </head><body>${html}</body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 400);
}

function copiarDocumento() {
  const editor = document.getElementById('doc-editor');
  if (!editor) return;
  navigator.clipboard.writeText(editor.innerText||editor.textContent)
    .then(()=>showToast('✅ Texto copiado! Cole no Word ou Google Docs.'));
}

// Carrega docs salvos do localStorage ao iniciar
(function carregarDocsSalvos() {
  try {
    const saved = localStorage.getItem('wb_erp_docs');
    if (saved) { _docsSalvos = JSON.parse(saved); _docId = Math.max(..._docsSalvos.map(d=>d.id),0)+1; }
  } catch(e) {}
})();

function handlePrintDrop(event, clienteId) {
  event.preventDefault();
  document.getElementById('print_drop_zone').style.borderColor = 'var(--border2)';
  const file = event.dataTransfer.files[0];
  if (file) previewPrint(file, clienteId);
}

let _printBase64Temp = null;
let _printFileNameTemp = null;
let _printTamanhoTemp = 0;

function previewPrint(file, clienteId) {
  if (!file) return;
  const erro = document.getElementById('print_erro');

  if (!file.type.startsWith('image/')) {
    if (erro) { erro.textContent='⚠️ Somente imagens são aceitas (PNG, JPG, WEBP).'; erro.style.display='block'; }
    return;
  }
  if (file.size > 5.2 * 1024 * 1024) {
    if (erro) { erro.textContent='⚠️ Imagem excede 5MB.'; erro.style.display='block'; }
    return;
  }
  if (erro) erro.style.display = 'none';

  const reader = new FileReader();
  reader.onload = e => {
    _printBase64Temp   = e.target.result;
    _printFileNameTemp = file.name;
    _printTamanhoTemp  = file.size;

    const prev     = document.getElementById('print_preview_area');
    const img      = document.getElementById('print_preview_img');
    const info     = document.getElementById('print_preview_info');
    const btn      = document.getElementById('print_salvar_btn');
    const dropZone = document.getElementById('print_drop_zone');

    if (img)  img.src = e.target.result;
    if (prev) prev.style.display = 'block';
    if (info) info.textContent = `${file.name} · ${(file.size/1024).toFixed(0)} KB`;
    if (btn)  { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
    if (dropZone) dropZone.style.borderColor = '#60a5fa';
  };
  reader.readAsDataURL(file);
}

function salvarPrintProcesso(clienteId) {
  const desc = document.getElementById('print_desc')?.value?.trim();
  const erro = document.getElementById('print_erro');

  if (!desc) {
    if (erro) { erro.textContent='⚠️ Descreva o que está sendo mostrado no print.'; erro.style.display='block'; }
    return;
  }
  if (!_printBase64Temp) {
    if (erro) { erro.textContent='⚠️ Selecione uma imagem.'; erro.style.display='block'; }
    return;
  }

  const agora  = new Date();
  const data   = agora.toLocaleDateString('pt-BR');
  const hora   = agora.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

  printsProcesso.push({
    id         : _printId++,
    clienteId,
    autor      : currentUser?.name || 'Equipe WB',
    autorRole  : currentRole === 'ceo' ? 'CEO / Diretor' : 'Colaborador',
    autorAvatar: currentUser?.avatar || 'WB',
    data,
    hora,
    descricao  : desc,
    arquivo    : _printFileNameTemp,
    tamanho    : _printTamanhoTemp,
    base64     : _printBase64Temp,
  });

  _printBase64Temp   = null;
  _printFileNameTemp = null;

  saveData();
  closeModal();
  showToast('📸 Print salvo! O cliente já pode visualizar no portal.');

  // Atualiza a tela atual se estiver em processos/clientes
  if (['clientes','processos','linha-do-tempo','dossie'].includes(currentPage)) {
    navigateTo(currentPage);
  }
}

function baixarPrint(id) {
  const p = printsProcesso.find(x=>x.id===id);

  a.download = p.arquivo || `print_processo_${p.data.replace(/\//g,'-')}.png`;
  a.click();
}

    id: _leadId++, nome,
    tel:     document.getElementById('ld_tel')?.value?.trim()||'',
    email:   document.getElementById('ld_email')?.value?.trim()||'',
    pais:    document.getElementById('ld_pais')?.value?.trim()||'',

    origem:  document.getElementById('ld_origem')?.value||'',

function openEditLead(id) {
  const l = leads.find(x=>x.id===id);

  const respOpts = colaboradores.map(c=>`<option value="${c.nome}" ${l.resp===c.nome?'selected':''}>${c.nome}</option>`).join('');

      <div class="form-field"><label>Origem</label>
        <select id="eld_origem">

      💬 Entrar em contato via WhatsApp
    </button></div>` : ''}`);

}

function salvarEdicaoLead(id) {
  const l = leads.find(x=>x.id===id);
  if (!l) return;
  l.nome    = document.getElementById('eld_nome')?.value?.trim()||l.nome;
  l.tel     = document.getElementById('eld_tel')?.value?.trim()||'';
  l.email   = document.getElementById('eld_email')?.value?.trim()||'';
  l.pais    = document.getElementById('eld_pais')?.value?.trim()||'';
  l.servico = document.getElementById('eld_servico')?.value||'';
  l.origem  = document.getElementById('eld_origem')?.value||'';
  l.resp    = document.getElementById('eld_resp')?.value||'';
  l.status  = document.getElementById('eld_status')?.value||'novo';
  l.obs     = document.getElementById('eld_obs')?.value?.trim()||'';
  // Se fechou, converte em cliente automaticamente
  if (l.status==='fechado') {
    const jaCliente = clientes.find(c=>c.nome.toLowerCase()===l.nome.toLowerCase());
    if (!jaCliente && confirm(`"${l.nome}" foi fechado! Deseja cadastrar como cliente agora?`)) {
      closeModal(); openNovoCliente(l.servico); return;
    }
  }
  saveData(); closeModal(); navigateTo('crm-leads');
  showToast('✅ Lead atualizado!');
}

function excluirLead(id) {
  if (!confirm('Excluir este lead?')) return;
  leads = leads.filter(x=>x.id!==id);
  saveData(); closeModal(); navigateTo('crm-leads');
}

function enviarFormLanding() {
  const nome = document.getElementById('lp_nome')?.value?.trim();
  const tel  = document.getElementById('lp_tel')?.value?.trim();
  if (!nome||!tel) { alert('Por favor preencha Nome e WhatsApp.'); return; }
  // Salva no localStorage para o sistema buscar
  const lead = {
    id: Date.now(), nome, tel,
    email:   document.getElementById('lp_email')?.value?.trim()||'',
    pais:    document.getElementById('lp_pais')?.value?.trim()||'',
    servico: document.getElementById('lp_servico')?.value||'',
    origem:  'Site / Landing Page',
    status:  'novo',
    data:    new Date().toLocaleDateString('pt-BR'),
    obs:     'Captado pela Landing Page',
  };
  // Persiste no LS compartilhado
  try {
    const raw = localStorage.getItem('wb_erp_dados');
    const d = raw ? JSON.parse(raw) : {};
    d.leads = d.leads||[];
    d.leads.push(lead);
    localStorage.setItem('wb_erp_dados', JSON.stringify(d));
  } catch(e){}
  document.getElementById('lp_form').style.display='none';
  document.getElementById('lp_sucesso').style.display='block';
  // Abre WA da empresa
  setTimeout(()=>{
    const a=document.createElement('a');a.href=WB_WA_LINK;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
  },1500);

      </div>
      <button class="btn btn-gold" onclick="openNovaPromo()">+ Nova Promoção</button>
    </div>

    ${ativas.length===0 && vencidas.length===0 ? `
      <div style="text-align:center;padding:60px;color:var(--text3)">
        <div style="font-size:3rem;margin-bottom:12px">🎁</div>
        <div style="margin-bottom:16px">Nenhuma promoção cadastrada ainda.</div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:24px">
      ${ativas.map(p=>cardPromo(p)).join('')}

    <div style="font-size:0.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">⌛ Vencidas</div>

      ${vencidas.map(p=>cardPromo(p)).join('')}
    </div>`:''}`;
}

function cardPromo(p) {
  const usos = p.usos||0;
  const limite = p.limite||0;
  const pct = limite>0?Math.round(usos/limite*100):0;
  return `
    <div style="background:var(--navy2);border:1px solid rgba(201,168,76,0.3);border-radius:14px;padding:18px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-10px;right:-10px;font-size:5rem;opacity:0.05">🎁</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="background:rgba(201,168,76,0.15);border:1px solid var(--gold);border-radius:8px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:0.9rem;font-weight:700;color:var(--gold)">${p.codigo}</div>
        <div style="font-size:1.3rem;font-weight:800;color:var(--green)">${p.tipo==='pct'?p.valor+'%':'R$ '+p.valor}</div>
      </div>
      <div style="font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:4px">${p.nome}</div>
      <div style="font-size:0.72rem;color:var(--text3);margin-bottom:10px">${p.descricao||''}</div>
      <div style="font-size:0.72rem;color:var(--text3);display:flex;justify-content:space-between;margin-bottom:8px">
        <span>Usos: ${usos}${limite>0?' / '+limite:''}</span>
        <span>${p.validade?'Válido até '+new Date(p.validade+'T12:00').toLocaleDateString('pt-BR'):'Sem vencimento'}</span>
      </div>
      ${limite>0?`<div style="background:var(--navy3);border-radius:4px;height:4px"><div style="background:var(--gold);height:100%;border-radius:4px;width:${pct}%"></div></div>`:''}
      <div style="display:flex;gap:6px;margin-top:12px">
        <button onclick="navigator.clipboard.writeText('${p.codigo}').then(()=>showToast('📋 Código copiado!'))"
          style="flex:1;background:var(--navy3);border:1px solid var(--border2);border-radius:7px;padding:7px;font-size:0.75rem;color:var(--text2);cursor:pointer">📋 Copiar</button>
        <button onclick="dispararPromoWA(${p.id})"
          style="flex:1;background:#25d366;color:#fff;border:none;border-radius:7px;padding:7px;font-size:0.75rem;font-weight:600;cursor:pointer">💬 Disparar</button>
        <button onclick="excluirPromo(${p.id})"
          style="background:var(--navy3);border:1px solid var(--border2);border-radius:7px;padding:7px;font-size:0.75rem;color:var(--red);cursor:pointer">🗑️</button>
      </div>
    </div>`;
}

function salvarPromo() {
  const nome   = document.getElementById('pr_nome')?.value?.trim();
  const codigo = document.getElementById('pr_codigo')?.value?.trim().toUpperCase();
  const valor  = parseFloat(document.getElementById('pr_valor')?.value)||0;
  if (!nome||!codigo||!valor) { showToast('⚠️ Preencha todos os campos obrigatórios','warn'); return; }
  if (promocoes.find(p=>p.codigo===codigo)) { showToast('⚠️ Código já existe!','warn'); return; }
  promocoes.push({
    id: _promoId++, nome, codigo, valor,
    tipo:     document.getElementById('pr_tipo')?.value||'pct',
    validade: document.getElementById('pr_validade')?.value||'',
    limite:   parseInt(document.getElementById('pr_limite')?.value)||0,
    descricao:document.getElementById('pr_desc')?.value?.trim()||'',
    usos: 0,
    criado: new Date().toLocaleDateString('pt-BR'),
  });
  saveData(); closeModal(); navigateTo('promocoes');
  showToast('✅ Promoção criada!');
}

function excluirPromo(id) {
  if (!confirm('Excluir esta promoção?')) return;
  promocoes = promocoes.filter(p=>p.id!==id);
  saveData(); navigateTo('promocoes');
}

function dispararPromoWA(id) {
  const p = promocoes.find(x=>x.id===id);
  if (!p) return;
  const desc = p.tipo==='pct' ? `${p.valor}% de desconto` : `R$ ${p.valor} de desconto`;
  const msg = `🎉 *Promoção Especial WB Assessoria Migratória!*\n\n${p.nome}\n\n✨ ${desc} no seu processo!\n\nUse o cupom: *${p.codigo}*\n\n${p.validade?`⏰ Válido até ${new Date(p.validade+'T12:00').toLocaleDateString('pt-BR')}\n\n`:''}Entre em contato agora e garanta sua vaga!\n\n_WB Assessoria Migratória_`;
  navigator.clipboard.writeText(msg).then(()=>showToast('📋 Mensagem copiada! Agora abra o WhatsApp.'));
  setTimeout(()=>{const a=document.createElement('a');a.href=WB_WA_LINK;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);},800);
}

}

// 📊 RELATÓRIO DE CONVERSÃO & NPS
// ══════════════════════════════════════════════════════════════════
function renderRelatorioConversao() {
  const totalLeads    = leads.length;
  const leadsConv     = leads.filter(l=>l.status==='fechado').length;
  const leadsPerdi    = leads.filter(l=>l.status==='perdido').length;
  const taxaConv      = totalLeads ? Math.round(leadsConv/totalLeads*100) : 0;
  const ticketMedio   = clientes.filter(c=>c.valor>0).length
    ? Math.round(clientes.reduce((s,c)=>s+(c.valor||0),0)/clientes.filter(c=>c.valor>0).length)
    : 0;
  const receitaTotal  = clientes.reduce((s,c)=>s+(c.valor||0),0);
  const clientesPagos = clientes.filter(c=>c.pago).length;

  // NPS
  const avaliacoes   = clientes.filter(c=>c.avaliacao);
  const mediaStars   = avaliacoes.length ? (avaliacoes.reduce((s,c)=>s+(c.avaliacao.estrelas||0),0)/avaliacoes.length).toFixed(1) : '—';
  const promotores   = avaliacoes.filter(c=>c.avaliacao.estrelas>=4).length;
  const detratores   = avaliacoes.filter(c=>c.avaliacao.estrelas<=2).length;
  const nps          = avaliacoes.length ? Math.round(((promotores-detratores)/avaliacoes.length)*100) : 0;

  // Origens
  const origens = {};
  leads.forEach(l=>{ origens[l.origem||'Direto']=(origens[l.origem||'Direto']||0)+1; });
  const top3Origens = Object.entries(origens).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Indicações
  const totalInd = clientes.filter(c=>c.indicadoPor).length;
  const pctInd   = clientes.length ? Math.round(totalInd/clientes.length*100) : 0;

  const stat = (icon,val,label,cor='var(--gold)') => `
    <div style="background:var(--navy2);border:1px solid var(--border2);border-radius:14px;padding:18px;text-align:center">
      <div style="font-size:1.5rem;margin-bottom:6px">${icon}</div>
      <div style="font-size:1.6rem;font-weight:800;color:${cor}">${val}</div>
      <div style="font-size:0.72rem;color:var(--text3);margin-top:4px">${label}</div>
    </div>`;

  return `
    <h2 style="font-size:1.2rem;font-weight:800;margin:0 0 20px">📊 Conversão, NPS & Crescimento</h2>

    <!-- Stats principais -->
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px">
      ${stat('🎯', totalLeads, 'Total de Leads')}
      ${stat('✅', taxaConv+'%', 'Taxa de Conversão', '#4ade80')}
      ${stat('💰', 'R$'+Math.round(receitaTotal/1000)+'k', 'Receita Total', 'var(--green)')}
      ${stat('🧾', 'R$'+Math.round(ticketMedio).toLocaleString('pt-BR'), 'Ticket Médio')}
      ${stat('⭐', mediaStars, 'Nota Média (NPS)', '#fbbf24')}
      ${stat('🤝', totalInd+' ('+pctInd+'%)', 'Clientes por Indicação', '#60a5fa')}
    </div>

    <div class="grid-2" style="gap:20px">
      <!-- Funil de leads -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">🔽 Funil de Leads</span></div>
        <div class="panel-body">
          ${LEAD_COLUNAS.map(col=>{
            const n = leads.filter(l=>l.status===col.id).length;
            const pct = totalLeads ? Math.round(n/totalLeads*100) : 0;
            return `
            <div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px">
                <span>${col.label}</span>
                <span style="color:var(--text3)">${n} (${pct}%)</span>
              </div>
              <div style="background:var(--navy3);border-radius:6px;height:8px">
                <div style="background:${col.borda};height:100%;border-radius:6px;width:${pct}%;transition:width 0.8s"></div>
              </div>
            </div>`;
          }).join('')}
          <div style="margin-top:16px;padding:12px;background:rgba(16,185,129,0.07);border-radius:8px;border:1px solid rgba(16,185,129,0.2);text-align:center">
            <div style="font-size:1.3rem;font-weight:800;color:var(--green)">${taxaConv}%</div>
            <div style="font-size:0.72rem;color:var(--text3)">Taxa de conversão geral</div>
          </div>
        </div>
      </div>

      <!-- NPS e avaliações -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">⭐ NPS & Satisfação</span></div>
        <div class="panel-body">
          <div style="text-align:center;padding:12px 0;margin-bottom:16px">
            <div style="font-size:3rem;font-weight:900;color:${nps>=50?'#4ade80':nps>=0?'#fbbf24':'#ef4444'}">${nps}</div>
            <div style="font-size:0.78rem;color:var(--text3)">NPS Score · ${avaliacoes.length} avaliação(ões)</div>
            <div style="font-size:0.9rem;margin-top:4px">${nps>=70?'😍 Excelente':nps>=50?'😊 Bom':nps>=0?'😐 Regular':'😞 Precisa melhorar'}</div>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:16px">
            ${[['Promotores',promotores,'#4ade80'],['Neutros',avaliacoes.filter(c=>c.avaliacao.estrelas===3).length,'#fbbf24'],['Detratores',detratores,'#ef4444']].map(([l,n,c])=>`
              <div style="flex:1;text-align:center;background:var(--navy3);border-radius:8px;padding:10px">
                <div style="font-size:1.2rem;font-weight:800;color:${c}">${n}</div>
                <div style="font-size:0.68rem;color:var(--text3)">${l}</div>
              </div>`).join('')}
          </div>
          ${avaliacoes.slice(-3).reverse().map(c=>`
            <div style="padding:8px;background:var(--navy3);border-radius:8px;margin-bottom:6px">
              <div style="display:flex;justify-content:space-between;margin-bottom:2px">
                <span style="font-size:0.78rem;font-weight:600">${c.nome.split(' ')[0]}</span>
                <span>${'⭐'.repeat(c.avaliacao.estrelas)}</span>
              </div>
              <div style="font-size:0.72rem;color:var(--text3);font-style:italic">"${(c.avaliacao.texto||'').slice(0,80)}${(c.avaliacao.texto||'').length>80?'...':''}"</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Origens dos leads -->
    <div class="panel" style="margin-top:20px">
      <div class="panel-header"><span class="panel-title">📡 Origem dos Leads</span></div>
      <div class="panel-body">
        ${top3Origens.length===0 ? '<div style="text-align:center;color:var(--text3)">Nenhum lead cadastrado ainda.</div>' :
          top3Origens.map(([origem,n])=>{
            const pct = totalLeads?Math.round(n/totalLeads*100):0;
            return `
            <div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px">
                <span>${origem}</span><span style="color:var(--text3)">${n} leads (${pct}%)</span>
              </div>
              <div style="background:var(--navy3);border-radius:6px;height:8px">
                <div style="background:var(--gold);height:100%;border-radius:6px;width:${pct}%"></div>
              </div>
            </div>`;
          }).join('')}
      </div>
    </div>`;
}

// 🎂 ALERTAS DE ANIVERSÁRIO
// ══════════════════════════════════════════════════════════════════
function checkAniversarios() {
  const hoje = new Date();
  const dia  = String(hoje.getDate()).padStart(2,'0');
  const mes  = String(hoje.getMonth()+1).padStart(2,'0');
  const aniv = clientes.filter(c=>{
    if (!c.dataNascimento) return false;
    const parts = c.dataNascimento.split(/[-\/]/);
    if (parts.length < 3) return false;
    // Aceita DD/MM/YYYY ou YYYY-MM-DD
    const [d,m] = parts[0].length===4 ? [parts[2],parts[1]] : [parts[0],parts[1]];
    return d===dia && m===mes;
  });
  if (aniv.length > 0) {
    aniv.forEach(c=>{
      setTimeout(()=>{
        showToast(`🎂 Aniversário hoje: ${c.nome.split(' ')[0]}!`, 'info');
      }, 1500);
    });
  }
  return aniv;
}

function enviarPainsAniversario(clienteId) {
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  const nome1 = c.nome.split(' ')[0];
  const tel   = (c.tel||'').replace(/\D/g,'');
  const fone  = tel.length>=10?(tel.startsWith('55')?tel:'55'+tel):null;
  const msg   = `🎂 *Feliz Aniversário, ${nome1}!*\n\nA equipe WB Assessoria Migratória deseja um dia especial cheio de realizações e conquistas!\n\nConte sempre conosco no seu processo migratório. 🇧🇷\n\n_Com carinho, Equipe WB_ ❤️`;
  if (fone) {
    const url = `https://wa.me/${fone}?text=${encodeURIComponent(msg)}`;
    const a = document.createElement('a'); a.href=url; a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } else {
    navigator.clipboard.writeText(msg).then(()=>showToast('📋 Mensagem copiada!'));
  }
}

// Widget de aniversários para o Dashboard
function widgetAniversarios() {
  const aniv = checkAniversarios();
  const prox = clientes.filter(c=>{
    if (!c.dataNascimento) return false;
    const hoje = new Date();
    const parts = c.dataNascimento.split(/[-\/]/);
    if (parts.length < 3) return false;
    const [d,m] = parts[0].length===4 ? [parts[2],parts[1]] : [parts[0],parts[1]];
    const proxData = new Date(hoje.getFullYear(), parseInt(m)-1, parseInt(d));
    if (proxData < hoje) proxData.setFullYear(proxData.getFullYear()+1);
    const diff = Math.ceil((proxData-hoje)/(1000*60*60*24));
    return diff <= 7 && diff > 0;
  });
  if (aniv.length===0 && prox.length===0) return '';
  return `
    <div class="panel" style="margin-bottom:20px;border-color:rgba(251,191,36,0.4)">
      <div class="panel-header" style="background:rgba(251,191,36,0.06)">

let _agDiaSel = '';
let _agHoraSel = '';
function selecionarDiaAg(idx, dataStr) {
  document.querySelectorAll('[id^="agd_"]').forEach(el=>{
    el.style.background='var(--navy3)'; el.style.borderColor='var(--border2)'; el.style.color='var(--text)'; delete el.dataset.sel;
  });
  const el = document.getElementById('agd_'+idx);
  if (el) { el.style.background='rgba(201,168,76,0.15)'; el.style.borderColor='var(--gold)'; el.style.color='var(--gold)'; el.dataset.sel='1'; }
  _agDiaSel = dataStr;
  _agHoraSel = '';
  document.getElementById('ag_horarios_wrap').style.display='block';
  document.getElementById('ag_form').style.display='none';
  document.querySelectorAll('#ag_horarios > div').forEach(el=>{ delete el.dataset.sel; el.style.borderColor='var(--border2)'; el.style.color='var(--text2)'; el.style.background='var(--navy3)'; });
}
function selecionarHoraAg(hora, el) {
  document.querySelectorAll('#ag_horarios > div').forEach(x=>{ delete x.dataset.sel; x.style.borderColor='var(--border2)'; x.style.color='var(--text2)'; x.style.background='var(--navy3)'; });
  el.style.borderColor='var(--gold)'; el.style.color='var(--gold)'; el.style.background='rgba(201,168,76,0.1)'; el.dataset.sel='1';
  _agHoraSel = hora;
  document.getElementById('ag_form').style.display='block';
}
function confirmarAgendamento(nomeCliente) {
  if (!_agDiaSel||!_agHoraSel) { showToast('⚠️ Selecione dia e horário','warn'); return; }
  const tipo = document.getElementById('ag_tipo')?.value||'Consulta';
  const obs  = document.getElementById('ag_obs')?.value?.trim()||'';
  const c    = clienteLogado();
  // Registra no sistema
  agendamentos.push({ id:_agendId++, data:_agDiaSel, hora:_agHoraSel, cliente:c?.nome||nomeCliente, tipo, colaborador:'Equipe WB', obs, origem:'portal' });
  saveData();
  // Avisa WB via WA
  const msg = `📅 *Novo agendamento solicitado pelo portal!*\n\nCliente: ${c?.nome||nomeCliente}\nData: ${_agDiaSel} às ${_agHoraSel}\nTipo: ${tipo}${obs?'\nObs: '+obs:''}`;
  const a = document.createElement('a');
  a.href = `https://wa.me/${WB_WHATSAPP}?text=${encodeURIComponent(msg)}`;
  a.target='_blank'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('✅ Agendamento solicitado! WB receberá pelo WhatsApp.');
  navigateTo('agendamentos-cliente');
}

// 📈 PROJEÇÃO FINANCEIRA
// ══════════════════════════════════════════════════════════════════
function renderProjecaoFinanceira() {
  const hoje = new Date();
  const meses = [];
  for (let i=0; i<6; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth()+i, 1);
    meses.push({ label: d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}), date: d, receita:0, previsto:0 });
  }

  // Receita realizada (clientes pagos)
  clientes.filter(c=>c.pago && c.valor>0).forEach(c=>{
    const idx = 0; // mês atual
    if (meses[idx]) meses[idx].receita += c.valor||0;
  });

  // Previsão de parcelas futuras
  clientes.forEach(c=>{
    const nParc = c.parcelas||0;
    const vlrParc = c.valorParcela||0;
    const parcsReg = c.parcelasRegistradas||[];
    for (let p=1; p<=nParc; p++) {
      const paga = parcsReg.find(x=>x.n===p);
      if (!paga) {
        // Distribui parcelas pendentes nos próximos meses
        const mesIdx = Math.min(p, meses.length-1);
        if (meses[mesIdx]) meses[mesIdx].previsto += vlrParc;
      }
    }
  });

  const maxVal = Math.max(...meses.map(m=>Math.max(m.receita,m.previsto)), 1);

  return `
    <div class="panel">
      <div class="panel-header"><span class="panel-title">📈 Projeção Financeira — Próximos 6 Meses</span></div>
      <div class="panel-body">
        <div style="display:flex;align-items:flex-end;gap:8px;height:160px;margin-bottom:12px;padding:0 8px">
          ${meses.map((m,i)=>{
            const hR = m.receita>0?Math.max(8,Math.round(m.receita/maxVal*140)):0;
            const hP = m.previsto>0?Math.max(8,Math.round(m.previsto/maxVal*140)):0;
            return `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div style="display:flex;gap:2px;align-items:flex-end;width:100%">
                ${hR>0?`<div style="flex:1;height:${hR}px;background:var(--green);border-radius:4px 4px 0 0;transition:height 0.6s" title="Realizado: R$${m.receita.toLocaleString('pt-BR')}"></div>`:'<div style="flex:1"></div>'}
                ${hP>0?`<div style="flex:1;height:${hP}px;background:rgba(201,168,76,0.5);border:1px dashed var(--gold);border-radius:4px 4px 0 0;transition:height 0.6s" title="Previsto: R$${m.previsto.toLocaleString('pt-BR')}"></div>`:'<div style="flex:1"></div>'}
              </div>
              <div style="font-size:0.65rem;color:var(--text3);text-align:center;margin-top:4px">${m.label}</div>
            </div>`; }).join('')}
        </div>
        <div style="display:flex;gap:16px;justify-content:center;font-size:0.72rem">
          <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;background:var(--green);border-radius:2px"></div> Realizado</div>
          <div style="display:flex;align-items:center;gap:5px"><div style="width:12px;height:12px;background:rgba(201,168,76,0.5);border:1px dashed var(--gold);border-radius:2px"></div> Previsto (parcelas)</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px">
          ${meses.slice(0,3).map(m=>`
            <div style="background:var(--navy3);border-radius:8px;padding:10px;text-align:center">
              <div style="font-size:0.65rem;color:var(--text3);margin-bottom:3px">${m.label}</div>
              ${m.receita>0?`<div style="font-size:0.82rem;font-weight:700;color:var(--green)">R$${m.receita.toLocaleString('pt-BR')}</div>`:''}
              ${m.previsto>0?`<div style="font-size:0.75rem;color:var(--gold)">+R$${m.previsto.toLocaleString('pt-BR')}</div>`:''}
              ${!m.receita&&!m.previsto?`<div style="font-size:0.72rem;color:var(--text3)">—</div>`:''}
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

      <canvas id="sig_canvas" width="500" height="160"
        style="width:100%;background:#fff;border:2px solid var(--border2);border-radius:10px;cursor:crosshair;touch-action:none"></canvas>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <div style="font-size:0.7rem;color:var(--text3)">Desenhe sua assinatura acima</div>
        <button onclick="limparAssinatura()" style="background:transparent;border:none;color:var(--text3);font-size:0.75rem;cursor:pointer;text-decoration:underline">Limpar</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="salvarAssinatura(${clienteId},'${(contratoTipo||'Contrato').replace(/'/g,'')}')">✅ Confirmar Assinatura</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    </div>`);
  setTimeout(()=>initAssinaturaCanvas(),100);
}

function initAssinaturaCanvas() {
  const canvas = document.getElementById('sig_canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let drawing = false;
  ctx.strokeStyle = '#0a0f1e'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches?.[0]||e;
    return { x:(src.clientX-r.left)*(canvas.width/r.width), y:(src.clientY-r.top)*(canvas.height/r.height) };
  };
  canvas.onmousedown = canvas.ontouchstart = e=>{ e.preventDefault(); drawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  canvas.onmousemove = canvas.ontouchmove = e=>{ e.preventDefault(); if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
  canvas.onmouseup = canvas.ontouchend = ()=>{ drawing=false; };
}
function limparAssinatura() {
  const c = document.getElementById('sig_canvas');
  if(c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}
function salvarAssinatura(clienteId, contratoTipo) {
  const canvas = document.getElementById('sig_canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const pixels = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasContent = pixels.some(v=>v!==0);
  if (!hasContent) { showToast('⚠️ Por favor, assine antes de confirmar','warn'); return; }
  const c = clientes.find(x=>x.id===clienteId);
  if (!c) return;
  c.assinaturas = c.assinaturas||[];
  c.assinaturas.push({
    contrato: contratoTipo,
    data:     new Date().toLocaleDateString('pt-BR'),
    hora:     new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    img:      canvas.toDataURL('image/png'),
    ip:       '—',
  });
  saveData();
  closeModal();
  showToast(`✅ Contrato "${contratoTipo}" assinado digitalmente!`);
}
